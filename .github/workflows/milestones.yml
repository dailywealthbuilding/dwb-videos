name: Subscriber Milestones + Scoreboard

# Runs daily 4PM UTC = 7PM EAT
# Checks sub count against milestones
# Fires ntfy alert when milestone hit
# Generates live scoreboard at docs/index.html (GitHub Pages)

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: {}

jobs:
  milestones:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check milestones and update scoreboard
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NTFY_TOPIC:            ${{ secrets.NTFY_TOPIC }}
        run: |
          node << 'MILESTONESEOF'
          const https = require('https');
          const fs    = require('fs');

          const CLIENT_ID     = process.env.YOUTUBE_CLIENT_ID     || '';
          const CLIENT_SECRET = process.env.YOUTUBE_CLIENT_SECRET || '';
          const REFRESH_TOKEN = process.env.YOUTUBE_REFRESH_TOKEN || '';
          const NTFY          = process.env.NTFY_TOPIC            || '';

          const MILESTONES = [100, 500, 1000, 2500, 5000, 10000, 25000, 50000, 100000];

          function safeTitle(s) {
            return (s || '').replace(/[^\x20-\x7E]/g, '').replace(/\s+/g, ' ').trim().slice(0, 100);
          }

          function fmt(n) {
            const num = parseInt(n || 0);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000)    return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
          }

          function httpsRequest(options, body) {
            return new Promise(function(resolve, reject) {
              const req = https.request(options, function(res) {
                let data = '';
                res.on('data', function(d) { data += d; });
                res.on('end', function() { resolve({ status: res.statusCode, body: data }); });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          function sendNtfy(message, title, priority, tags) {
            if (!NTFY) return Promise.resolve();
            const data = Buffer.from(message);
            return new Promise(function(resolve) {
              const req = https.request({
                hostname: 'ntfy.sh', port: 443, path: '/' + NTFY, method: 'POST',
                headers: {
                  'Content-Type': 'text/plain', 'Content-Length': data.length,
                  'Title': safeTitle(title), 'Tags': tags || 'tada',
                  'Priority': priority || 'default',
                },
              }, function(res) { console.log('ntfy: ' + res.statusCode); resolve(); });
              req.on('error', function() { resolve(); });
              req.write(data); req.end();
            });
          }

          async function getAccessToken() {
            const body = 'client_id=' + encodeURIComponent(CLIENT_ID) +
              '&client_secret=' + encodeURIComponent(CLIENT_SECRET) +
              '&refresh_token=' + encodeURIComponent(REFRESH_TOKEN) +
              '&grant_type=refresh_token';
            const res  = await httpsRequest({
              hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': Buffer.byteLength(body) }
            }, body);
            const data = JSON.parse(res.body);
            if (!data.access_token) {
              let ed = {};
              try { ed = JSON.parse(res.body); } catch(e) {}
              if (ed.error === 'invalid_grant') {
                await sendNtfy(
                  'YouTube token expired.\n\nFix: developers.google.com/oauthplayground\nGet new refresh token -> update YOUTUBE_REFRESH_TOKEN secret.',
                  'ACTION REQUIRED YouTube Token Expired', 'urgent', 'x,warning'
                );
              }
              throw new Error('Token failed');
            }
            return data.access_token;
          }

          async function getChannelStats(token) {
            const res  = await httpsRequest({
              hostname: 'www.googleapis.com',
              path: '/youtube/v3/channels?part=statistics,snippet&mine=true',
              method: 'GET', headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = JSON.parse(res.body);
            const item = (data.items || [])[0] || {};
            return {
              subs:   parseInt((item.statistics || {}).subscriberCount || 0),
              views:  parseInt((item.statistics || {}).viewCount       || 0),
              videos: parseInt((item.statistics || {}).videoCount      || 0),
            };
          }

          function getChallengeDay() {
            const start = new Date('2026-02-11');
            const today = new Date();
            const diff  = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            return Math.max(1, Math.min(90, diff + 1));
          }

          function generateScoreboard(stats, day, history) {
            const pct     = Math.round((day / 90) * 100);
            const nextMs  = MILESTONES.find(function(m) { return m > stats.subs; }) || stats.subs;
            const msPct   = Math.min(100, Math.round((stats.subs / nextMs) * 100));
            const today   = new Date().toISOString().slice(0, 10);

            var milestoneItems = '';
            MILESTONES.forEach(function(m) {
              if (m <= stats.subs) {
                milestoneItems += '<span class="ms-done">OK ' + m.toLocaleString() + '</span>';
              } else if (m === nextMs) {
                milestoneItems += '<span class="ms-next">NEXT ' + m.toLocaleString() + '</span>';
              } else {
                milestoneItems += '<span class="ms-future">' + m.toLocaleString() + '</span>';
              }
            });

            var chartBars = '';
            var chartData = history.slice(-8);
            var maxViews  = 1;
            chartData.forEach(function(h) { if ((h.views || 0) > maxViews) maxViews = h.views; });
            chartData.forEach(function(h) {
              var ht = Math.max(2, Math.round(((h.views || 0) / maxViews) * 76));
              var lbl = (h.week || h.date || '').slice(5, 10) || '';
              chartBars += '<div class="bar-col"><div class="bar-v" style="height:' + ht + 'px"></div><div class="bar-label">' + lbl + '</div></div>';
            });

            return '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n' +
              '<meta name="viewport" content="width=device-width,initial-scale=1">\n' +
              '<title>DWB -- 90 Day Challenge Scoreboard</title>\n' +
              '<link rel="preconnect" href="https://fonts.googleapis.com">\n' +
              '<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">\n' +
              '<style>\n' +
              '*{box-sizing:border-box;margin:0;padding:0}\n' +
              'body{background:#050507;color:#e8e8f0;font-family:"JetBrains Mono",monospace;min-height:100vh;padding:24px 16px 48px}\n' +
              '.container{max-width:680px;margin:0 auto}\n' +
              '.header{text-align:center;margin-bottom:28px;padding:28px 20px;background:#0a0a0c;border:1px solid rgba(202,255,0,0.15)}\n' +
              '.day-badge{font-size:10px;letter-spacing:4px;color:#CAFF00;margin-bottom:8px}\n' +
              '.title{font-family:Anton,sans-serif;font-size:clamp(32px,7vw,56px);letter-spacing:2px;color:#fff;margin-bottom:6px}\n' +
              '.subtitle{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:3px}\n' +
              '.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}\n' +
              '@media(min-width:480px){.cards{grid-template-columns:repeat(4,1fr)}}\n' +
              '.card{background:#0a0a0c;border:1px solid rgba(255,255,255,0.07);padding:14px;text-align:center}\n' +
              '.card-num{font-family:Anton,sans-serif;font-size:32px;color:#CAFF00;line-height:1}\n' +
              '.card-label{font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-top:4px}\n' +
              '.section{background:#0a0a0c;border:1px solid rgba(255,255,255,0.07);padding:18px;margin-bottom:12px}\n' +
              '.section-title{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:12px}\n' +
              '.bar{height:6px;background:rgba(255,255,255,0.08);margin-bottom:6px}\n' +
              '.bar-fill{height:100%;background:#CAFF00}\n' +
              '.bar-label-row{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:12px}\n' +
              '.bars{display:flex;align-items:flex-end;gap:5px;height:80px}\n' +
              '.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}\n' +
              '.bar-v{width:100%;background:#CAFF00;border-radius:2px 2px 0 0;min-height:2px}\n' +
              '.bar-label{font-size:7px;color:rgba(255,255,255,0.3);text-align:center}\n' +
              '.ms-list{display:flex;flex-wrap:wrap;gap:6px}\n' +
              '.ms-done{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.2);padding:4px 10px;font-size:9px;font-weight:700}\n' +
              '.ms-next{background:rgba(202,255,0,0.1);color:#CAFF00;border:1px solid rgba(202,255,0,0.3);padding:4px 10px;font-size:9px;font-weight:700}\n' +
              '.ms-future{background:#0a0a0c;color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.07);padding:4px 10px;font-size:9px}\n' +
              '.live{display:inline-block;width:5px;height:5px;border-radius:50%;background:#00ff88;margin-right:5px;animation:pulse 2s infinite}\n' +
              '@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}\n' +
              '.footer{text-align:center;font-size:8px;color:rgba(255,255,255,0.2);margin-top:20px;letter-spacing:2px}\n' +
              '</style>\n</head>\n<body>\n<div class="container">\n' +
              '<div class="header">\n' +
              '<div class="day-badge"><span class="live"></span>LIVE -- Updated ' + today + '</div>\n' +
              '<div class="title">DAY ' + day + ' <span style="color:#CAFF00">/ 90</span></div>\n' +
              '<div class="subtitle">@DailyWealthBuilding -- 90-Day Public Challenge</div>\n' +
              '</div>\n' +
              '<div class="cards">\n' +
              '<div class="card"><div class="card-num">' + day + '</div><div class="card-label">Day / 90</div></div>\n' +
              '<div class="card"><div class="card-num">' + fmt(stats.subs) + '</div><div class="card-label">Subscribers</div></div>\n' +
              '<div class="card"><div class="card-num">' + fmt(stats.views) + '</div><div class="card-label">Total Views</div></div>\n' +
              '<div class="card"><div class="card-num">' + stats.videos + '</div><div class="card-label">Videos Live</div></div>\n' +
              '</div>\n' +
              '<div class="section">\n' +
              '<div class="section-title">CHALLENGE PROGRESS</div>\n' +
              '<div class="bar"><div class="bar-fill" style="width:' + pct + '%"></div></div>\n' +
              '<div class="bar-label-row"><span>' + pct + '% complete</span><span>' + (90 - day) + ' days remaining</span></div>\n' +
              '<div class="section-title">NEXT MILESTONE: ' + nextMs.toLocaleString() + ' SUBS</div>\n' +
              '<div class="bar"><div class="bar-fill" style="width:' + msPct + '%"></div></div>\n' +
              '<div class="bar-label-row"><span>' + msPct + '%</span><span>' + (nextMs - stats.subs).toLocaleString() + ' to go</span></div>\n' +
              '</div>\n' +
              (chartBars ? '<div class="section"><div class="section-title">WEEKLY VIEWS</div><div class="bars">' + chartBars + '</div></div>\n' : '') +
              '<div class="section"><div class="section-title">SUBSCRIBER MILESTONES</div><div class="ms-list">' + milestoneItems + '</div></div>\n' +
              '<div class="footer">Auto-updates daily -- @DailyWealthBuilding -- 90-Day Public Challenge</div>\n' +
              '</div>\n</body>\n</html>';
          }

          (async function() {
            if (!CLIENT_ID || !REFRESH_TOKEN) {
              console.log('YouTube secrets not configured -- skipping');
              process.exit(0);
            }

            let token, stats;
            try {
              token = await getAccessToken();
              stats = await getChannelStats(token);
              console.log('Stats: ' + stats.subs + ' subs | ' + stats.views + ' views | ' + stats.videos + ' videos');
            } catch(e) {
              console.log('Could not fetch stats: ' + e.message);
              process.exit(0);
            }

            // Load previous state
            let prevState = { subs: 0, milestonesHit: [], lastCheck: '' };
            try { prevState = JSON.parse(fs.readFileSync('milestone-state.json', 'utf8')); } catch(e) {}

            // Check new milestones
            const newMilestones = MILESTONES.filter(function(m) {
              return stats.subs >= m && (prevState.milestonesHit || []).indexOf(m) === -1;
            });

            for (var i = 0; i < newMilestones.length; i++) {
              var ms = newMilestones[i];
              console.log('MILESTONE HIT: ' + ms + ' subscribers!');
              await sendNtfy(
                '@DailyWealthBuilding just hit ' + ms.toLocaleString() + ' subscribers!\n\n' +
                'Total views: ' + stats.views.toLocaleString() + '\n' +
                'Videos live: ' + stats.videos + '\n\n' +
                'Keep going My King!',
                'MILESTONE ' + ms.toLocaleString() + ' SUBSCRIBERS HIT', 'urgent', 'tada,trophy,fire'
              );
              prevState.milestonesHit = prevState.milestonesHit || [];
              prevState.milestonesHit.push(ms);
            }

            // Also send daily check-in (not milestone) every day
            if (newMilestones.length === 0) {
              const nextMs    = MILESTONES.find(function(m) { return m > stats.subs; }) || '?';
              const remaining = typeof nextMs === 'number' ? (nextMs - stats.subs) : '?';
              await sendNtfy(
                'Daily check-in:\n' +
                'Subscribers: ' + stats.subs.toLocaleString() + '\n' +
                'Total views:  ' + fmt(stats.views) + '\n' +
                'Videos live:  ' + stats.videos + '\n\n' +
                'Next milestone: ' + (typeof nextMs === 'number' ? nextMs.toLocaleString() : nextMs) + ' (' + remaining + ' to go)',
                'DWB Daily Stats', 'low', 'chart_with_upwards_trend'
              );
            }

            // Update state
            prevState.subs      = stats.subs;
            prevState.lastCheck = new Date().toISOString();
            fs.writeFileSync('milestone-state.json', JSON.stringify(prevState, null, 2));

            // Generate scoreboard
            const day = getChallengeDay();
            let history = [];
            try { history = JSON.parse(fs.readFileSync('analytics-history.json', 'utf8')); } catch(e) {}

            const html = generateScoreboard(stats, day, history);
            fs.mkdirSync('docs', { recursive: true });
            fs.writeFileSync('docs/index.html', html);
            console.log('Scoreboard updated: docs/index.html');
            console.log('Day ' + day + ' | Subs: ' + stats.subs);
          })();
          MILESTONESEOF

      - name: Commit scoreboard and milestone state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add docs/index.html milestone-state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update scoreboard [skip ci]"
          git push || true
