name: Weekly YouTube Analytics Report

# Runs every Sunday 5PM UTC = 8PM EAT
# Pulls last 7 days of YouTube analytics
# Sends full performance report via ntfy
# Saves history to analytics-history.json

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch: {}

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch YouTube Analytics and send report
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NTFY_TOPIC:            ${{ secrets.NTFY_TOPIC }}
        run: |
          node << 'ANALYTICSEOF'
          const https = require('https');
          const fs    = require('fs');

          const CLIENT_ID     = process.env.YOUTUBE_CLIENT_ID     || '';
          const CLIENT_SECRET = process.env.YOUTUBE_CLIENT_SECRET || '';
          const REFRESH_TOKEN = process.env.YOUTUBE_REFRESH_TOKEN || '';
          const NTFY          = process.env.NTFY_TOPIC            || '';

          function safeTitle(s) {
            return (s || '').replace(/[^\x20-\x7E]/g, '').replace(/\s+/g, ' ').trim().slice(0, 100);
          }

          function fmt(n) {
            if (n === undefined || n === null) return '--';
            const num = typeof n === 'string' ? parseFloat(n) : n;
            if (isNaN(num)) return '--';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000)    return (num / 1000).toFixed(1) + 'K';
            return Math.round(num).toString();
          }

          function trend(current, previous) {
            if (!previous || previous === 0) return '';
            const pct = ((current - previous) / previous) * 100;
            if (pct > 5)  return ' (+' + Math.round(pct) + '%)';
            if (pct < -5) return ' (' + Math.round(pct) + '%)';
            return '';
          }

          function httpsRequest(options, body) {
            return new Promise(function(resolve, reject) {
              const req = https.request(options, function(res) {
                let data = '';
                res.on('data', function(d) { data += d; });
                res.on('end', function() { resolve({ status: res.statusCode, body: data }); });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          function sendNtfy(message, title, priority, tags) {
            if (!NTFY) return Promise.resolve();
            const data = Buffer.from(message);
            return new Promise(function(resolve) {
              const req = https.request({
                hostname: 'ntfy.sh', port: 443, path: '/' + NTFY, method: 'POST',
                headers: {
                  'Content-Type': 'text/plain', 'Content-Length': data.length,
                  'Title': safeTitle(title), 'Tags': tags || 'bar_chart',
                  'Priority': priority || 'default',
                },
              }, function(res) { console.log('ntfy: ' + res.statusCode); resolve(); });
              req.on('error', function() { resolve(); });
              req.write(data); req.end();
            });
          }

          async function getAccessToken() {
            const body = 'client_id=' + encodeURIComponent(CLIENT_ID) +
              '&client_secret=' + encodeURIComponent(CLIENT_SECRET) +
              '&refresh_token=' + encodeURIComponent(REFRESH_TOKEN) +
              '&grant_type=refresh_token';
            const res  = await httpsRequest({
              hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': Buffer.byteLength(body) }
            }, body);
            const data = JSON.parse(res.body);
            if (!data.access_token) {
              let ed = {};
              try { ed = JSON.parse(res.body); } catch(e) {}
              if (ed.error === 'invalid_grant') {
                await sendNtfy(
                  'YouTube token expired.\n\nFix: developers.google.com/oauthplayground\nGet new refresh token -> update YOUTUBE_REFRESH_TOKEN secret.',
                  'ACTION REQUIRED YouTube Token Expired', 'urgent', 'x,warning'
                );
              }
              throw new Error('Token failed: ' + res.body.slice(0, 100));
            }
            return data.access_token;
          }

          async function fetchAnalytics(token, metrics, startDate, endDate) {
            const path = '/youtube/analytics/v2/reports?ids=channel%3D%3DMINE' +
              '&startDate=' + startDate + '&endDate=' + endDate +
              '&metrics=' + metrics + '&maxResults=1';
            const res = await httpsRequest({
              hostname: 'youtubeanalytics.googleapis.com', path: path, method: 'GET',
              headers: { 'Authorization': 'Bearer ' + token }
            });
            return JSON.parse(res.body);
          }

          async function fetchChannelStats(token) {
            const res = await httpsRequest({
              hostname: 'www.googleapis.com',
              path: '/youtube/v3/channels?part=statistics,snippet&mine=true',
              method: 'GET', headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = JSON.parse(res.body);
            const item = (data.items || [])[0] || {};
            return {
              subs:   parseInt((item.statistics || {}).subscriberCount || 0),
              views:  parseInt((item.statistics || {}).viewCount       || 0),
              videos: parseInt((item.statistics || {}).videoCount      || 0),
              title:  (item.snippet || {}).title || '@DailyWealthBuilding',
            };
          }

          (async function() {
            if (!CLIENT_ID || !REFRESH_TOKEN) {
              console.log('YouTube secrets not configured -- skipping');
              process.exit(0);
            }

            const now       = new Date();
            const endDate   = now.toISOString().slice(0, 10);
            const startMs   = now.getTime() - 7 * 24 * 60 * 60 * 1000;
            const startDate = new Date(startMs).toISOString().slice(0, 10);
            const prevEnd   = new Date(startMs - 1).toISOString().slice(0, 10);
            const prevStart = new Date(startMs - 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);

            let token;
            try {
              token = await getAccessToken();
              console.log('Token OK');
            } catch(e) {
              console.log('ERROR: ' + e.message);
              process.exit(0);
            }

            const METRICS = 'views,estimatedMinutesWatched,averageViewDuration,subscribersGained,subscribersLost,likes,comments,shares';

            const [weekData, prevWeekData, channelStats] = await Promise.all([
              fetchAnalytics(token, METRICS, startDate, endDate).catch(function() { return null; }),
              fetchAnalytics(token, 'views,estimatedMinutesWatched,subscribersGained', prevStart, prevEnd).catch(function() { return null; }),
              fetchChannelStats(token).catch(function() { return {}; }),
            ]);

            function getMetric(data, name) {
              if (!data || !data.rows || !data.rows[0]) return 0;
              const cols = (data.columnHeaders || []).map(function(c) { return c.name; });
              const idx  = cols.indexOf(name);
              return idx >= 0 ? (data.rows[0][idx] || 0) : 0;
            }

            const views         = getMetric(weekData, 'views');
            const prevViews     = getMetric(prevWeekData, 'views');
            const watchMins     = getMetric(weekData, 'estimatedMinutesWatched');
            const prevWatchMins = getMetric(prevWeekData, 'estimatedMinutesWatched');
            const avgDur        = getMetric(weekData, 'averageViewDuration');
            const subsGained    = getMetric(weekData, 'subscribersGained');
            const prevSubs      = getMetric(prevWeekData, 'subscribersGained');
            const subsLost      = getMetric(weekData, 'subscribersLost');
            const likes         = getMetric(weekData, 'likes');
            const comments      = getMetric(weekData, 'comments');
            const shares        = getMetric(weekData, 'shares');

            const netSubs  = subsGained - subsLost;
            const watchHrs = Math.round(watchMins / 60);
            const avgMin   = Math.floor(avgDur / 60);
            const avgSec   = String(Math.round(avgDur % 60)).padStart(2, '0');
            const avgFmt   = avgMin + ':' + avgSec;

            let retention = 'Low (<33%) -- review hooks urgently';
            if (avgDur >= 25)      retention = 'Excellent (83%+ retained)';
            else if (avgDur >= 20) retention = 'Strong (66%+ retained)';
            else if (avgDur >= 15) retention = 'Good (50%+ retained)';
            else if (avgDur >= 10) retention = 'Fair (33%+ retained) -- review hooks';

            // Save to history
            const entry = {
              date: endDate, week: startDate + ' to ' + endDate,
              views: views, watchMins: watchMins, watchHrs: watchHrs,
              avgDuration: avgDur, subsGained: subsGained, subsLost: subsLost,
              netSubs: netSubs, totalSubs: channelStats.subs || 0,
              totalViews: channelStats.views || 0, likes: likes,
              comments: comments, shares: shares,
            };
            let history = [];
            try { history = JSON.parse(fs.readFileSync('analytics-history.json', 'utf8')); } catch(e) {}
            history.push(entry);
            if (history.length > 13) history = history.slice(-13);
            fs.writeFileSync('analytics-history.json', JSON.stringify(history, null, 2));
            console.log('Saved to analytics-history.json');

            const lines = [
              'DWB WEEKLY ANALYTICS -- ' + startDate + ' to ' + endDate,
              '--------------------------------------',
              '',
              'THIS WEEK',
              'Views:        ' + fmt(views)      + trend(views, prevViews),
              'Watch Time:   ' + watchHrs + 'hrs (' + fmt(watchMins) + ' mins)' + trend(watchMins, prevWatchMins),
              'Avg Duration: ' + avgFmt + ' -- ' + retention,
              'New Subs:     +' + fmt(subsGained) + ' / -' + fmt(subsLost) + ' = NET ' + (netSubs >= 0 ? '+' : '') + fmt(netSubs) + trend(subsGained, prevSubs),
              'Likes:        ' + fmt(likes),
              'Comments:     ' + fmt(comments),
              'Shares:       ' + fmt(shares),
              '',
              'CHANNEL TOTALS',
              'Subscribers:  ' + fmt(channelStats.subs),
              'Total Views:  ' + fmt(channelStats.views),
              'Total Videos: ' + channelStats.videos,
              '',
              'NEXT STEPS',
              avgDur < 15  ? '- Review hook strength -- losing viewers in first 5s' : '- Hooks working -- maintain this style',
              comments > 20 ? '- Reply to top 5 comments to boost algorithm' : '- Reply to ALL comments this week',
              shares > 5    ? '- High share rate -- create a shareable infographic' : '- Add stronger CTA asking viewers to share',
            ];

            const message = lines.join('\n');
            console.log('\n' + message);

            await sendNtfy(
              message,
              'DWB Weekly Analytics ' + fmt(views) + ' views',
              'default',
              'bar_chart,trophy'
            );

            console.log('Analytics report sent');
          })();
          ANALYTICSEOF

      - name: Commit analytics history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add analytics-history.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update analytics history [skip ci]"
          git push || true
