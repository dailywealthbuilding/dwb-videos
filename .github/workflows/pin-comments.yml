name: Post Pinned Comments (Daily)

# ─────────────────────────────────────────────────────────────────────────────
# Runs daily at 10AM UTC (1PM EAT) — 1 hour after scheduled video publishes
# Checks scheduled-videos.json for videos that just went public
# Posts pinned comment on each newly public video
# Marks them as commentPosted: true so they're never double-posted
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 10 * * *'  # Daily 10AM UTC = 1PM EAT
  workflow_dispatch: {}   # Manual trigger if needed

jobs:
  pin-comments:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post pinned comments on newly public videos
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs    = require('fs');

          const CLIENT_ID     = process.env.YOUTUBE_CLIENT_ID;
          const CLIENT_SECRET = process.env.YOUTUBE_CLIENT_SECRET;
          const REFRESH_TOKEN = process.env.YOUTUBE_REFRESH_TOKEN;
          const NTFY          = process.env.NTFY_TOPIC;

          if (!CLIENT_ID || !CLIENT_SECRET || !REFRESH_TOKEN) {
            console.log('YouTube secrets not configured -- skipping.');
            process.exit(0);
          }

          // ── Load scheduled videos ──
          let scheduled = [];
          try {
            scheduled = JSON.parse(fs.readFileSync('scheduled-videos.json', 'utf8'));
          } catch(e) {
            console.log('No scheduled-videos.json found -- nothing to process.');
            process.exit(0);
          }

          const now = new Date();
          const pending = scheduled.filter(v => {
            if (v.commentPosted) return false;
            if (!v.publishAt)    return false;
            // Only process videos that should have gone public by now
            return new Date(v.publishAt) <= now;
          });

          console.log('Videos pending pinned comment: ' + pending.length);
          if (pending.length === 0) {
            console.log('Nothing to do today.');
            process.exit(0);
          }

          function httpsRequest(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function getAccessToken() {
            const body = new URLSearchParams({
              client_id:     CLIENT_ID,
              client_secret: CLIENT_SECRET,
              refresh_token: REFRESH_TOKEN,
              grant_type:    'refresh_token',
            }).toString();
            const res = await httpsRequest({
              hostname: 'oauth2.googleapis.com',
              path:     '/token',
              method:   'POST',
              headers:  { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': Buffer.byteLength(body) }
            }, body);
            const data = JSON.parse(res.body);
            if (!data.access_token) throw new Error('Failed to get access token: ' + res.body);
            return data.access_token;
          }

          async function checkVideoPublic(accessToken, videoId) {
            const res = await httpsRequest({
              hostname: 'www.googleapis.com',
              path:     '/youtube/v3/videos?part=status&id=' + videoId,
              method:   'GET',
              headers:  { 'Authorization': 'Bearer ' + accessToken }
            });
            const data = JSON.parse(res.body);
            const item = (data.items || [])[0];
            return item && item.status && item.status.privacyStatus === 'public';
          }

          async function postComment(accessToken, videoId, text) {
            const body = JSON.stringify({
              snippet: {
                videoId,
                topLevelComment: { snippet: { textOriginal: text } },
              },
            });
            const res = await httpsRequest({
              hostname: 'www.googleapis.com',
              path:     '/youtube/v3/commentThreads?part=snippet',
              method:   'POST',
              headers:  {
                'Authorization':  'Bearer ' + accessToken,
                'Content-Type':   'application/json',
                'Content-Length': Buffer.byteLength(body),
              },
            }, body);
            if (res.status !== 200) throw new Error('Comment failed: HTTP ' + res.status + ' ' + res.body);
            return JSON.parse(res.body).id;
          }

          async function sendNtfy(message, title) {
            if (!NTFY) return;
            const data = Buffer.from(message);
            return new Promise((resolve) => {
              const req = https.request({
                hostname: 'ntfy.sh', port: 443, path: '/' + NTFY, method: 'POST',
                headers: {
                  'Content-Type': 'text/plain', 'Content-Length': data.length,
                  'Title': title, 'Tags': 'pushpin', 'Priority': 'default',
                }
              }, res => { console.log('ntfy: HTTP ' + res.statusCode); resolve(); });
              req.on('error', () => resolve());
              req.write(data);
              req.end();
            });
          }

          (async () => {
            let accessToken;
            try {
              accessToken = await getAccessToken();
              console.log('YouTube access token obtained');
            } catch(e) {
              console.log('ERROR: ' + e.message);
              process.exit(1);
            }

            let posted = 0, skipped = 0, failed = 0;
            const ntfyLines = ['DWB Pinned Comments — ' + now.toISOString().slice(0, 10), ''];

            for (const video of pending) {
              console.log('\nProcessing: ' + video.day + ' (' + video.videoId + ')');

              // Double-check it's actually public now
              try {
                const isPublic = await checkVideoPublic(accessToken, video.videoId);
                if (!isPublic) {
                  console.log('SKIP: ' + video.day + ' -- not yet public');
                  ntfyLines.push(video.day + ': not yet public -- will retry tomorrow');
                  skipped++;
                  continue;
                }
              } catch(e) {
                console.log('WARN: Could not check status for ' + video.day + ': ' + e.message);
              }

              if (!video.pinnedComment) {
                console.log('SKIP: ' + video.day + ' -- no pinned comment');
                video.commentPosted = true; // mark done so we don't retry
                skipped++;
                continue;
              }

              try {
                await postComment(accessToken, video.videoId, video.pinnedComment);
                video.commentPosted = true;
                console.log('Pinned comment posted: ' + video.day + ' -> ' + video.url);
                ntfyLines.push(video.day + ' pinned ✅ -> ' + video.url);
                posted++;
              } catch(e) {
                console.log('FAILED: ' + video.day + ': ' + e.message);
                ntfyLines.push(video.day + ' FAILED: ' + e.message);
                failed++;
              }

              // Small delay between API calls
              await new Promise(r => setTimeout(r, 1000));
            }

            // ── Save updated scheduled-videos.json ──
            fs.writeFileSync('scheduled-videos.json', JSON.stringify(scheduled, null, 2));

            console.log('\n--- Pinned Comments Summary ---');
            console.log('Posted: ' + posted + ' | Skipped: ' + skipped + ' | Failed: ' + failed);

            // ── Send ntfy notification ──
            ntfyLines.push('');
            ntfyLines.push('Posted: ' + posted + ' | Skipped: ' + skipped + ' | Failed: ' + failed);
            await sendNtfy(ntfyLines.join('\n'), 'DWB Pinned Comments ' + (failed > 0 ? 'PARTIAL' : 'DONE'));
          })();
          EOF

      - name: Commit updated scheduled-videos.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scheduled-videos.json
          git diff --staged --quiet || git commit -m "chore: update pinned comment status [skip ci]"
          git push
