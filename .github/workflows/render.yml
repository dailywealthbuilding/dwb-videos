name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx remotion browser ensure

      - name: Upload background videos to Cloudinary (dwb/ folder)
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          node -e "
          const https = require('https');
          const crypto = require('crypto');
          const fs = require('fs');

          const CLOUD = process.env.CLOUDINARY_CLOUD_NAME;
          const API_KEY = process.env.CLOUDINARY_API_KEY;
          const API_SECRET = process.env.CLOUDINARY_API_SECRET;
          const PIXABAY_KEY = process.env.PIXABAY_API_KEY;

          const ASSETS = [
            { id: 'entrepreneur_laptop', query: 'entrepreneur working laptop' },
            { id: 'person_thinking', query: 'person thinking' },
            { id: 'writing_notes', query: 'writing notes desk' },
            { id: 'business_setup', query: 'online business setup' },
            { id: 'stopwatch_timer', query: 'timer stopwatch' },
            { id: 'content_creator', query: 'content creator desk setup' },
            { id: 'social_media_phone', query: 'social media phone' },
            { id: 'business_statistics', query: 'social media statistics screen' },
            { id: 'small_business', query: 'small business owner' },
            { id: 'laptop_income', query: 'online income laptop' },
            { id: 'frustrated_laptop', query: 'frustrated person laptop' },
            { id: 'desk_workspace', query: 'home office workspace' },
            { id: 'phone_filming', query: 'phone filming setup' },
            { id: 'clock_time', query: 'clock time management' },
            { id: 'calendar_planning', query: 'calendar planning' },
          ];

          function cloudinarySign(params) {
            const sorted = Object.keys(params).sort().map(k => k + '=' + params[k]).join('&');
            return crypto.createHash('sha256').update(sorted + API_SECRET).digest('hex');
          }

          async function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }

          async function downloadFile(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              https.get(url, res => {
                if (res.statusCode === 301 || res.statusCode === 302) {
                  fs.unlinkSync(dest);
                  downloadFile(res.headers.location, dest).then(resolve).catch(reject);
                  return;
                }
                res.pipe(file);
                file.on('finish', () => { file.close(); resolve(); });
              }).on('error', reject);
            });
          }

          async function uploadToCloudinary(filePath, publicId) {
            const timestamp = Math.floor(Date.now() / 1000);
            const params = { public_id: 'dwb/' + publicId, timestamp };
            const signature = cloudinarySign(params);
            const { default: fd } = await import('form-data');
            const form = new fd();
            form.append('file', fs.createReadStream(filePath));
            form.append('public_id', 'dwb/' + publicId);
            form.append('timestamp', timestamp.toString());
            form.append('api_key', API_KEY);
            form.append('signature', signature);
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.cloudinary.com',
                path: '/v1_1/' + CLOUD + '/video/upload',
                method: 'POST',
                headers: form.getHeaders(),
              }, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  const json = JSON.parse(data);
                  if (json.error) reject(new Error(json.error.message));
                  else resolve(json);
                });
              });
              req.on('error', reject);
              form.pipe(req);
            });
          }

          (async () => {
            for (const item of ASSETS) {
              try {
                console.log('Processing: ' + item.id);
                const pixabayUrl = 'https://pixabay.com/api/videos/?key=' + PIXABAY_KEY + '&q=' + encodeURIComponent(item.query) + '&per_page=3';
                const data = await fetchJSON(pixabayUrl);
                if (!data.hits || data.hits.length === 0) { console.log('No results for ' + item.query); continue; }
                const videoUrl = data.hits[0].videos.medium.url;
                const tmpFile = '/tmp/' + item.id + '.mp4';
                await downloadFile(videoUrl, tmpFile);
                const result = await uploadToCloudinary(tmpFile, item.id);
                console.log('Uploaded: dwb/' + item.id + ' -> ' + result.secure_url);
                fs.unlinkSync(tmpFile);
              } catch(e) {
                console.error('Failed ' + item.id + ': ' + e.message);
              }
            }
          })();
          "

      - name: Verify Cloudinary URLs (dwb/ folder)
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: |
          node -e "
          const https = require('https');
          const CLOUD = process.env.CLOUDINARY_CLOUD_NAME;
          const ids = ['entrepreneur_laptop','person_thinking','writing_notes','business_setup','stopwatch_timer','content_creator','social_media_phone','business_statistics','small_business','laptop_income','frustrated_laptop','desk_workspace','phone_filming','clock_time','calendar_planning'];
          let failed = 0;
          const checks = ids.map(id => new Promise(resolve => {
            const url = 'https://res.cloudinary.com/' + CLOUD + '/video/upload/dwb/' + id + '.mp4';
            https.get(url, res => {
              if (res.statusCode === 200) { console.log('✅ ' + id); resolve(true); }
              else { console.log('❌ ' + id + ' — ' + res.statusCode); failed++; resolve(false); }
            }).on('error', e => { console.log('❌ ' + id + ' — ' + e.message); failed++; resolve(false); });
          }));
          Promise.all(checks).then(() => { if (failed > 0) { console.error(failed + ' assets failed'); process.exit(1); } else console.log('All assets verified ✅'); });
          "

      - name: Render all videos
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node render-all.js

      - name: Upload rendered videos to Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const crypto = require('crypto');

          const CLOUD = process.env.CLOUDINARY_CLOUD_NAME;
          const API_KEY = process.env.CLOUDINARY_API_KEY;
          const API_SECRET = process.env.CLOUDINARY_API_SECRET;

          function cloudinarySign(params) {
            const sorted = Object.keys(params).sort().map(k => k + '=' + params[k]).join('&');
            return crypto.createHash('sha256').update(sorted + API_SECRET).digest('hex');
          }

          const videos = ['day22','day23','day24','day25','day26','day27','day28'];

          (async () => {
            const { default: fd } = await import('form-data');
            for (const day of videos) {
              const filePath = 'out/' + day + '.mp4';
              if (!fs.existsSync(filePath)) { console.log('Missing: ' + filePath); continue; }
              const timestamp = Math.floor(Date.now() / 1000);
              const publicId = 'dwb/rendered/' + day;
              const params = { public_id: publicId, timestamp };
              const signature = cloudinarySign(params);
              const form = new fd();
              form.append('file', fs.createReadStream(filePath));
              form.append('public_id', publicId);
              form.append('timestamp', timestamp.toString());
              form.append('api_key', API_KEY);
              form.append('signature', signature);
              await new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: 'api.cloudinary.com',
                  path: '/v1_1/' + CLOUD + '/video/upload',
                  method: 'POST',
                  headers: form.getHeaders(),
                }, res => {
                  let data = '';
                  res.on('data', d => data += d);
                  res.on('end', () => {
                    const json = JSON.parse(data);
                    if (json.error) { console.error('Failed ' + day + ': ' + json.error.message); reject(); }
                    else { console.log('✅ Uploaded ' + day + ': ' + json.secure_url); resolve(); }
                  });
                });
                req.on('error', reject);
                form.pipe(req);
              });
            }
          })();
          "
