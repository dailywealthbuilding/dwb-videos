name: Render Week 4 Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      video_id:
        description: "Render one video (e.g. day22) or leave blank for ALL"
        required: false
        default: ""

jobs:
  render:
    name: Render Videos with Remotion
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Upload videos to Cloudinary
        run: |
          npm install -g cloudinary-cli
          for VIDEO_ID in 3194038 3252459 4065982 6985580 4481316 3196007 8371648 6963944 3252453 7564710 7688336 5699456 3296467 6890254; do
          wget -q -O /tmp/${VIDEO_ID}.mp4 "https://videos.pexels.com/video-files/${VIDEO_ID}/${VIDEO_ID}-hd_1920_1080_25fps.mp4" || \
          wget -q -O /tmp/${VIDEO_ID}.mp4 "https://videos.pexels.com/video-files/${VIDEO_ID}/${VIDEO_ID}-uhd_2560_1440_25fps.mp4"
          cld uploader upload /tmp/${VIDEO_ID}.mp4 public_id=${VIDEO_ID} resource_type=video overwrite=false || true
          done
        env:
          CLOUDINARY_URL: cloudinary://${{ secrets.CLOUDINARY_API_KEY }}:${{ secrets.CLOUDINARY_API_SECRET }}@${{ secrets.CLOUDINARY_CLOUD_NAME }}
          
      - name: Install Chrome dependencies
        run: |
           sudo apt-get update -qq
           sudo apt-get install -y wget gnupg \
           libnss3 libatk-bridge2.0-0 \
           libcups2 libdrm2 libxcomposite1 libxdamage1 \
           libxrandr2 libgbm1
           wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
           sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
    
      - name: Create output directory
        run: mkdir -p output
        
      - name: Render videos
        run: |
          npx remotion browser ensure --browser-executable=$(which google-chrome-stable)
          export CHROME_FLAGS="--headless=new"
          if [ -z "${{ github.event.inputs.video_id }}" ]; then
            node render-all.js
          else
            npx remotion render src/index.jsx \
              ${{ github.event.inputs.video_id }} \
              output/${{ github.event.inputs.video_id }}_final.mp4 \
              --codec=h264 --quality=85
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          REMOTION_CHROME_FLAGS: "--headless=new"

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: week4-videos-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: error
