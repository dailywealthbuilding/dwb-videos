name: Render Week 4 Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      video_id:
        description: "Render one video (e.g. day22) or leave blank for ALL"
        required: false
        default: ""

jobs:
  render:
    name: Render Videos with Remotion
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Chrome dependencies
        run: |
           sudo apt-get update -qq
           sudo apt-get install -y wget gnupg \
           libnss3 libatk-bridge2.0-0 \
           libcups2 libdrm2 libxcomposite1 libxdamage1 \
           libxrandr2 libgbm1
           wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
           sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
    
      - name: Create output directory
        run: mkdir -p output

      - name: Download Pexels videos
        run: |
          mkdir -p src/assets/videos
          wget -q -O src/assets/videos/3194038.mp4 "https://videos.pexels.com/video-files/3194038/3194038-uhd_2560_1440_25fps.mp4"
          wget -q -O src/assets/videos/3252459.mp4 "https://videos.pexels.com/video-files/3252459/3252459-uhd_2560_1440_25fps.mp4"
          wget -q -O src/assets/videos/4065982.mp4 "https://videos.pexels.com/video-files/4065982/4065982-hd_1920_1080_25fps.mp4"
          wget -q -O src/assets/videos/6985580.mp4 "https://videos.pexels.com/video-files/6985580/6985580-uhd_2560_1440_30fps.mp4"
          wget -q -O src/assets/videos/4481316.mp4 "https://videos.pexels.com/video-files/4481316/4481316-hd_1920_1080_25fps.mp4"
          wget -q -O src/assets/videos/3196007.mp4 "https://videos.pexels.com/video-files/3196007/3196007-uhd_2560_1440_25fps.mp4"
          wget -q -O src/assets/videos/8371648.mp4 "https://videos.pexels.com/video-files/8371648/8371648-uhd_3840_2160_25fps.mp4"
          wget -q -O src/assets/videos/6963944.mp4 "https://videos.pexels.com/video-files/6963944/6963944-uhd_2560_1440_25fps.mp4"
          wget -q -O src/assets/videos/3252453.mp4 "https://videos.pexels.com/video-files/3252453/3252453-uhd_2560_1440_25fps.mp4"
          wget -q -O src/assets/videos/7564710.mp4 "https://videos.pexels.com/video-files/7564710/7564710-hd_1920_1080_25fps.mp4"
          wget -q -O src/assets/videos/7688336.mp4 "https://videos.pexels.com/video-files/7688336/7688336-uhd_3840_2160_30fps.mp4"
          wget -q -O src/assets/videos/5699456.mp4 "https://videos.pexels.com/video-files/5699456/5699456-hd_1920_1080_25fps.mp4"
          wget -q -O src/assets/videos/3296467.mp4 "https://videos.pexels.com/video-files/3296467/3296467-uhd_2560_1440_25fps.mp4"
          wget -q -O src/assets/videos/6890254.mp4 "https://videos.pexels.com/video-files/6890254/6890254-uhd_2560_1440_25fps.mp4"

      - name: Render videos
        run: |
          npx remotion browser ensure --browser-executable=$(which google-chrome-stable)
          export CHROME_FLAGS="--headless=new"
          if [ -z "${{ github.event.inputs.video_id }}" ]; then
            node render-all.js
          else
            npx remotion render src/index.jsx \
              ${{ github.event.inputs.video_id }} \
              output/${{ github.event.inputs.video_id }}_final.mp4 \
              --codec=h264 --quality=85
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          REMOTION_CHROME_FLAGS: "--headless=new"

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: week4-videos-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: error
