      - name: Generate SRT subtitle files
        if: success()
        run: |
          node << 'EOF'
          const fs   = require('fs');
          const path = require('path');
          const FPS  = 30;
          const info = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));

          function framesToSRT(frames) {
            const totalMs = Math.round((frames / FPS) * 1000);
            const h  = Math.floor(totalMs / 3600000);
            const m  = Math.floor((totalMs % 3600000) / 60000);
            const s  = Math.floor((totalMs % 60000) / 1000);
            const ms = totalMs % 1000;
            return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' +
                   String(s).padStart(2,'0') + ',' + String(ms).padStart(3,'0');
          }

          const srcDir      = 'src';
          const contentFiles = fs.readdirSync(srcDir).filter(f => f.match(/^week\d+-content\.js$/));
          const weekNums    = contentFiles.map(f => parseInt(f.match(/week(\d+)/)[1])).sort((a,b) => b - a);
          const activeFile  = path.join(srcDir, 'week' + weekNums[0] + '-content.js');
          const source      = fs.readFileSync(activeFile, 'utf8');

          const defaultMatch = source.match(/export\s+default\s+(\[[\s\S]*\]);?\s*$/m);
          const namedMatch   = source.match(/export\s+const\s+\w+\s*=\s*(\[[\s\S]*?\]);\s*(?=export|$)/m);
          const arrayStr     = defaultMatch ? defaultMatch[1] : (namedMatch ? namedMatch[1] : null);
          let entries = [];
          try { if (arrayStr) entries = eval(arrayStr); } catch(e) {}

          let generated = 0;
          for (const entry of entries) {
            if (!entry.overlays || !entry.id) continue;
            const srtLines = [];
            let index = 1;
            for (const o of entry.overlays) {
              if (!o.text || o.startFrame === undefined || o.endFrame === undefined) continue;
              srtLines.push(String(index));
              srtLines.push(framesToSRT(o.startFrame) + ' --> ' + framesToSRT(o.endFrame));
              srtLines.push(o.text.replace(/\n/g, ' '));
              srtLines.push('');
              index++;
            }
            if (srtLines.length > 0) {
              fs.writeFileSync('out/srt/' + entry.id + '.srt', srtLines.join('\n'));
              generated++;
            }
          }
          console.log('Generated ' + generated + ' SRT files');
          EOF

      - name: Upload to YouTube
        if: success()
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          node << 'EOF'
          const https  = require('https');
          const fs     = require('fs');
          const path   = require('path');

          const CLIENT_ID     = process.env.YOUTUBE_CLIENT_ID;
          const CLIENT_SECRET = process.env.YOUTUBE_CLIENT_SECRET;
          const REFRESH_TOKEN = process.env.YOUTUBE_REFRESH_TOKEN;

          if (!CLIENT_ID || !CLIENT_SECRET || !REFRESH_TOKEN) {
            console.log('YouTube secrets not configured -- skipping auto-upload.');
            process.exit(0);
          }

          const info = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));

          const daysOverride = '${{ github.event.inputs.days_override }}';
          const uploadDays   = daysOverride
            ? daysOverride.split(',').map(d => d.trim()).filter(Boolean)
            : info.days;

          function httpsPost(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve({ status: res.statusCode, body: data, headers: res.headers }));
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          function httpsRequest(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve({ status: res.statusCode, body: data, headers: res.headers }));
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function getAccessToken() {
            const body = new URLSearchParams({
              client_id:     CLIENT_ID,
              client_secret: CLIENT_SECRET,
              refresh_token: REFRESH_TOKEN,
              grant_type:    'refresh_token',
            }).toString();

            const res = await httpsPost({
              hostname: 'oauth2.googleapis.com',
              path:     '/token',
              method:   'POST',
              headers:  {
                'Content-Type':   'application/x-www-form-urlencoded',
                'Content-Length': Buffer.byteLength(body),
              }
            }, body);

            const data = JSON.parse(res.body);
            if (!data.access_token) throw new Error('Failed to get access token: ' + res.body);
            return data.access_token;
          }

          async function uploadVideo(accessToken, filePath, meta) {
            const fileSize = fs.statSync(filePath).size;

            const metadata = JSON.stringify({
              snippet: {
                title:       meta.title.slice(0, 100),
                description: meta.description,
                tags:        meta.tags,
                categoryId:  '22',
              },
              status: {
                privacyStatus:           'public',
                selfDeclaredMadeForKids: false,
              },
            });

            const initRes = await httpsRequest({
              hostname: 'www.googleapis.com',
              path:     '/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status',
              method:   'POST',
              headers:  {
                'Authorization':           'Bearer ' + accessToken,
                'Content-Type':            'application/json',
                'X-Upload-Content-Type':   'video/mp4',
                'X-Upload-Content-Length': fileSize,
                'Content-Length':          Buffer.byteLength(metadata),
              },
            }, metadata);

            if (initRes.status !== 200)
              throw new Error('Upload init failed: HTTP ' + initRes.status + ' ' + initRes.body);

            const uploadUrl = initRes.headers.location;
            if (!uploadUrl) throw new Error('No upload URL in response');

            const CHUNK       = 8 * 1024 * 1024;
            const fileHandle  = fs.openSync(filePath, 'r');
            let uploadedBytes = 0;
            let videoId       = null;

            while (uploadedBytes < fileSize) {
              const chunkSize = Math.min(CHUNK, fileSize - uploadedBytes);
              const buffer    = Buffer.alloc(chunkSize);
              fs.readSync(fileHandle, buffer, 0, chunkSize, uploadedBytes);

              const urlObj   = new URL(uploadUrl);
              const chunkRes = await new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: urlObj.hostname,
                  path:     urlObj.pathname + urlObj.search,
                  method:   'PUT',
                  headers:  {
                    'Content-Length': chunkSize,
                    'Content-Range':  'bytes ' + uploadedBytes + '-' + (uploadedBytes + chunkSize - 1) + '/' + fileSize,
                    'Content-Type':   'video/mp4',
                  },
                }, res => {
                  let data = '';
                  res.on('data', d => data += d);
                  res.on('end', () => resolve({ status: res.statusCode, body: data }));
                });
                req.on('error', reject);
                req.write(buffer);
                req.end();
              });

              uploadedBytes += chunkSize;

              if (chunkRes.status === 200 || chunkRes.status === 201) {
                videoId = JSON.parse(chunkRes.body).id;
                break;
              } else if (chunkRes.status === 308) {
                console.log('Uploading... ' + Math.round((uploadedBytes / fileSize) * 100) + '%');
              } else {
                throw new Error('Chunk upload failed: HTTP ' + chunkRes.status + ' ' + chunkRes.body);
              }
            }

            fs.closeSync(fileHandle);
            return videoId;
          }

          async function postComment(accessToken, videoId, text) {
            const body = JSON.stringify({
              snippet: {
                videoId,
                topLevelComment: { snippet: { textOriginal: text } },
              },
            });

            const res = await httpsRequest({
              hostname: 'www.googleapis.com',
              path:     '/youtube/v3/commentThreads?part=snippet',
              method:   'POST',
              headers:  {
                'Authorization':  'Bearer ' + accessToken,
                'Content-Type':   'application/json',
                'Content-Length': Buffer.byteLength(body),
              },
            }, body);

            if (res.status !== 200) throw new Error('Comment failed: HTTP ' + res.status);
            return JSON.parse(res.body).id;
          }

          (async () => {
            let uploaded = 0, failed = 0;
            const results = [];

            let accessToken;
            try {
              accessToken = await getAccessToken();
              console.log('YouTube access token obtained');
            } catch(e) {
              console.log('ERROR: Could not get YouTube access token: ' + e.message);
              process.exit(1);
            }

            for (const day of uploadDays) {
              const filePath = path.join('out', day + '_final.mp4');
              if (!fs.existsSync(filePath)) {
                console.log('SKIP: ' + day + ' -- video file not found');
                continue;
              }

              const meta = (info.dayMeta || {})[day];
              if (!meta || !meta.youtubeTitle) {
                console.log('SKIP: ' + day + ' -- no metadata');
                continue;
              }

              const sizeMB = Math.round(fs.statSync(filePath).size / 1024 / 1024 * 10) / 10;
              console.log('Uploading ' + day + ' (' + sizeMB + 'MB): ' + meta.youtubeTitle.slice(0, 60));

              try {
                const tags = (meta.tiktokCaption.match(/#\w+/g) || [])
                  .map(t => t.replace('#', '')).slice(0, 20);

                const videoId = await uploadVideo(accessToken, filePath, {
                  title:       meta.youtubeTitle,
                  description: meta.youtubeDescription,
                  tags,
                });

                if (!videoId) throw new Error('No video ID returned');
                console.log('Uploaded: ' + day + ' -> https://youtu.be/' + videoId);

                if (meta.pinnedComment && !meta.pinnedComment.startsWith('[UPDATE')) {
                  try {
                    await postComment(accessToken, videoId, meta.pinnedComment);
                    console.log('Pinned comment posted: ' + day);
                  } catch(e) {
                    console.log('Pinned comment FAILED (non-fatal): ' + e.message);
                  }
                }

                results.push({ day, videoId, url: 'https://youtu.be/' + videoId, status: 'ok' });
                uploaded++;
              } catch(e) {
                console.log('UPLOAD FAILED: ' + day + ': ' + e.message);
                results.push({ day, status: 'failed', error: e.message });
                failed++;
              }
            }

            fs.writeFileSync('out/.upload_results.json', JSON.stringify(results, null, 2));

            console.log('\n--- YouTube Upload Summary ---');
            console.log('Uploaded: ' + uploaded + ' | Failed: ' + failed);
            for (const r of results) {
              if (r.status === 'ok') console.log('  ' + r.day + ' -> ' + r.url);
              else console.log('  ' + r.day + ' -> FAILED: ' + r.error);
            }
          })();
          EOF

