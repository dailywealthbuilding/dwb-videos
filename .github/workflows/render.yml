name: Render Week 4 Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      video_id:
        description: "Render one video (e.g. day22) or leave blank for ALL"
        required: false
        default: ""

jobs:
  render:
    name: Render Videos with Remotion
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget gnupg \
            libnss3 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libxfixes3 libxkbcommon0 \
            libpango-1.0-0 libcairo2 libasound2t64
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Fetch and upload videos to Cloudinary
        run: |
          npm install cloudinary node-fetch@2
          node -e "
          const cloudinary = require('cloudinary').v2;
          const fetch = require('node-fetch');
          cloudinary.config({
            cloud_name: process.env.CLOUDINARY_CLOUD_NAME,
            api_key: process.env.CLOUDINARY_API_KEY,
            api_secret: process.env.CLOUDINARY_API_SECRET
          });
          const PIXABAY_KEY = process.env.PIXABAY_API_KEY;
          const searches = [
            { q: 'entrepreneur laptop',  id: 'entrepreneur_laptop' },
            { q: 'person thinking',      id: 'person_thinking' },
            { q: 'writing notes',        id: 'writing_notes' },
            { q: 'business setup',       id: 'business_setup' },
            { q: 'stopwatch timer',      id: 'stopwatch_timer' },
            { q: 'content creator',      id: 'content_creator' },
            { q: 'social media phone',   id: 'social_media_phone' },
            { q: 'business statistics',  id: 'business_statistics' },
            { q: 'small business',       id: 'small_business' },
            { q: 'laptop income',        id: 'laptop_income' },
            { q: 'frustrated laptop',    id: 'frustrated_laptop' },
            { q: 'desk workspace',       id: 'desk_workspace' },
            { q: 'phone filming',        id: 'phone_filming' },
            { q: 'clock time',           id: 'clock_time' },
            { q: 'calendar planning',    id: 'calendar_planning' }
          ];
          async function run() {
            for (const item of searches) {
              const url = \`https://pixabay.com/api/videos/?key=\${PIXABAY_KEY}&q=\${encodeURIComponent(item.q)}&per_page=3\`;
              const res = await fetch(url);
              const data = await res.json();
              if (data.hits && data.hits[0]) {
                const videoUrl = data.hits[0].videos.medium.url;
                await cloudinary.uploader.upload(videoUrl, {
                  public_id: item.id,
                  resource_type: 'video',
                  overwrite: true
                }).then(() => console.log('✅ ' + item.id))
                  .catch(e => console.log('❌ ' + item.id + ': ' + e.message));
              } else {
                console.log('⚠️ No results for: ' + item.q);
              }
            }
          }
          run();
          "
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

      - name: Create output directory
        run: mkdir -p output

      - name: Render videos
        run: |
          if [ -z "${{ github.event.inputs.video_id }}" ]; then
            node render-all.js
          else
            node render-all.js ${{ github.event.inputs.video_id }}
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: week4-videos-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: error
