name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install chrome-headless-shell
        run: npx remotion browser ensure

      - name: Download background videos from Pixabay
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          mkdir -p public/videos
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const KEY = process.env.PIXABAY_API_KEY;

          // 4 unique search queries per day = 28 unique clip files
          const DAY_ASSETS = {
            day29: [
              { id: 'day29_clip1', q: 'person sad thinking vertical' },
              { id: 'day29_clip2', q: 'laptop frustrated vertical' },
              { id: 'day29_clip3', q: 'comeback motivation vertical' },
              { id: 'day29_clip4', q: 'entrepreneur phone vertical' },
            ],
            day30: [
              { id: 'day30_clip1', q: 'business growth statistics vertical' },
              { id: 'day30_clip2', q: 'money income success vertical' },
              { id: 'day30_clip3', q: 'social media phone vertical' },
              { id: 'day30_clip4', q: 'milestone celebration vertical' },
            ],
            day31: [
              { id: 'day31_clip1', q: 'writing notes vertical' },
              { id: 'day31_clip2', q: 'person thinking desk vertical' },
              { id: 'day31_clip3', q: 'online business vertical' },
              { id: 'day31_clip4', q: 'affiliate marketing vertical' },
            ],
            day32: [
              { id: 'day32_clip1', q: 'phone social media vertical' },
              { id: 'day32_clip2', q: 'content creator phone vertical' },
              { id: 'day32_clip3', q: 'digital tools laptop vertical' },
              { id: 'day32_clip4', q: 'search online vertical' },
            ],
            day33: [
              { id: 'day33_clip1', q: 'phone filming vertical' },
              { id: 'day33_clip2', q: 'video editing laptop vertical' },
              { id: 'day33_clip3', q: 'content workflow vertical' },
              { id: 'day33_clip4', q: 'clock time vertical' },
            ],
            day34: [
              { id: 'day34_clip1', q: 'entrepreneur laptop vertical' },
              { id: 'day34_clip2', q: 'small business owner vertical' },
              { id: 'day34_clip3', q: 'online income vertical' },
              { id: 'day34_clip4', q: 'business decision vertical' },
            ],
            day35: [
              { id: 'day35_clip1', q: 'calendar planning vertical' },
              { id: 'day35_clip2', q: 'business review vertical' },
              { id: 'day35_clip3', q: 'success journey vertical' },
              { id: 'day35_clip4', q: 'desk workspace vertical' },
            ],
          };

          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function downloadFile(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const get = (u) => {
                https.get(u, res => {
                  if (res.statusCode === 301 || res.statusCode === 302) {
                    file.close();
                    return get(res.headers.location);
                  }
                  if (res.statusCode !== 200) {
                    reject(new Error('HTTP ' + res.statusCode));
                    return;
                  }
                  res.pipe(file);
                  file.on('finish', () => { file.close(); resolve(); });
                }).on('error', reject);
              };
              get(url);
            });
          }

          (async () => {
            let failed = 0;
            for (const [day, assets] of Object.entries(DAY_ASSETS)) {
              for (const item of assets) {
                const dest = 'public/videos/' + item.id + '.mp4';
                if (fs.existsSync(dest)) {
                  console.log('Already exists: ' + item.id);
                  continue;
                }
                try {
                  // Request portrait/vertical orientation from Pixabay
                  const url = 'https://pixabay.com/api/videos/?key=' + KEY
                    + '&q=' + encodeURIComponent(item.q)
                    + '&orientation=vertical'
                    + '&per_page=10'
                    + '&video_type=film';
                  const data = await fetchJSON(url);

                  // Fallback: if no vertical results, try without orientation filter
                  let hits = data.hits || [];
                  if (hits.length === 0) {
                    const fallbackUrl = 'https://pixabay.com/api/videos/?key=' + KEY
                      + '&q=' + encodeURIComponent(item.q)
                      + '&per_page=10'
                      + '&video_type=film';
                    const fallback = await fetchJSON(fallbackUrl);
                    hits = fallback.hits || [];
                  }

                  if (hits.length === 0) throw new Error('No results: ' + item.q);

                  let downloaded = false;
                  for (const hit of hits) {
                    const videoUrl = hit.videos.medium.url;
                    try {
                      await downloadFile(videoUrl, dest);
                      const size = fs.statSync(dest).size;
                      if (size < 10000) throw new Error('Too small');
                      console.log('OK ' + item.id + ' (' + Math.round(size/1024) + 'KB)');
                      downloaded = true;
                      break;
                    } catch(e) {
                      if (fs.existsSync(dest)) fs.unlinkSync(dest);
                    }
                  }
                  if (!downloaded) { console.log('FAILED: ' + item.id); failed++; }
                } catch(e) {
                  console.log('ERROR ' + item.id + ': ' + e.message);
                  failed++;
                }
              }
            }
            if (failed > 0) process.exit(1);
          })();
          EOF

      - name: Render all videos
        run: |
          BROWSER="./node_modules/.remotion/chrome-headless-shell/linux64/chrome-headless-shell-linux64/chrome-headless-shell"
          mkdir -p out
          FAILED=0
          for DAY in day29 day30 day31 day32 day33 day34 day35; do
            echo "Rendering ${DAY}..."
            npx remotion render src/index.jsx ${DAY} out/${DAY}_final.mp4 \
              --browser-executable="$BROWSER" \
              --codec=h264 \
            && echo "DONE ${DAY}" || { echo "FAILED ${DAY}"; FAILED=1; }
          done
          exit $FAILED

      - name: Upload rendered videos as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dwb-videos-${{ github.run_number }}
          path: out/*.mp4
          retention-days: 7
          if-no-files-found: error
