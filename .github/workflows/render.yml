name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install chrome-headless-shell
        run: npx remotion browser ensure

      - name: Render all videos
        run: |
          BROWSER="./node_modules/.remotion/chrome-headless-shell/linux64/chrome-headless-shell-linux64/chrome-headless-shell"
          echo "🌐 Browser: $BROWSER"
          mkdir -p out
          FAILED=0
          for DAY in day22 day23 day24 day25 day26 day27 day28; do
            echo "⚙ Rendering ${DAY}..."
            npx remotion render src/index.jsx ${DAY} out/${DAY}_final.mp4 \
              --browser-executable="$BROWSER" \
              --codec=h264 \
            && echo "✅ ${DAY} done" || { echo "❌ ${DAY} FAILED"; FAILED=1; }
          done
          exit $FAILED

      - name: Upload rendered videos as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dwb-videos-${{ github.run_number }}
          path: out/*.mp4
          retention-days: 7
          if-no-files-found: error
