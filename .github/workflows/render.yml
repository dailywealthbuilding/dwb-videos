name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      days_override:
        description: 'Specific days only, comma-separated (e.g. day43,day44). Leave blank to auto-detect.'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install chrome-headless-shell
        run: npx remotion browser ensure

      - name: Create required directories
        run: |
          mkdir -p public/videos
          mkdir -p public/music
          mkdir -p public/sfx
          mkdir -p out
          mkdir -p out/thumbs

      - name: Detect active week from content files
        run: |
          node << 'EOF'
          const fs   = require('fs');
          const path = require('path');

          // Find highest-numbered week content file in src/
          const srcDir = 'src';
          const contentFiles = fs.readdirSync(srcDir)
            .filter(f => f.match(/^week\d+-content\.js$/));

          if (contentFiles.length === 0) {
            console.log('ERROR: No week content files found in src/');
            process.exit(1);
          }

          const weekNums = contentFiles
            .map(f => parseInt(f.match(/week(\d+)/)[1]))
            .sort((a, b) => b - a);
          const activeWeek   = weekNums[0];
          const activeFile   = path.join(srcDir, `week${activeWeek}-content.js`);

          console.log(`Active week file: ${activeFile}`);

          // Parse content file - strip export declaration, eval the array
          const source = fs.readFileSync(activeFile, 'utf8');
          const match  = source.match(/export\s+const\s+\w+\s*=\s*(\[[\s\S]*\]);/);
          if (!match) {
            console.log(`ERROR: Could not parse content array from ${activeFile}`);
            process.exit(1);
          }

          let entries = [];
          try { entries = eval(match[1]); } catch(e) {
            console.log(`ERROR: eval failed: ${e.message}`);
            process.exit(1);
          }

          // Extract day IDs
          const days = entries.map(e => e.id).filter(Boolean);
          console.log(`Days detected: ${days.join(', ')}`);

          // Build DAY_ASSETS from pexelsSearchTerms (4 clips per day)
          const dayAssets = {};
          for (const entry of entries) {
            if (!entry.id || !entry.pexelsSearchTerms) continue;
            dayAssets[entry.id] = entry.pexelsSearchTerms
              .slice(0, 4)
              .map((q, i) => ({ id: `${entry.id}_clip${i + 1}`, q }));
          }

          // Write week info for subsequent steps
          fs.mkdirSync('out', { recursive: true });
          fs.writeFileSync('out/.week_info.json', JSON.stringify({
            week: `week${activeWeek}`,
            days,
            dayAssets
          }, null, 2));

          // Write to GitHub env
          const envFile = process.env.GITHUB_ENV;
          if (envFile) {
            fs.appendFileSync(envFile, `ACTIVE_WEEK=week${activeWeek}\n`);
            fs.appendFileSync(envFile, `ACTIVE_DAYS=${days.join(' ')}\n`);
          }

          console.log(`Active week: week${activeWeek}`);
          console.log(`Week info written to out/.week_info.json`);
          EOF

      - name: Run pre-render validator
        run: |
          if [ -f "validate.js" ]; then
            node validate.js && echo "Validation passed" || exit 1
          else
            echo "validate.js not found - skipping"
          fi

      - name: Validate music files
        run: |
          node << 'EOF'
          const fs   = require('fs');
          const info = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));
          const days = info.days;

          console.log(`Checking music for: ${days.join(', ')}`);

          let missing = 0;
          for (const day of days) {
            const p = `public/music/${day}.mp3`;
            if (!fs.existsSync(p)) {
              console.log(`MISSING MUSIC: ${p}`);
              missing++;
            } else {
              const size = fs.statSync(p).size;
              if (size < 50000) {
                console.log(`CORRUPT MUSIC (too small): ${p} (${size} bytes)`);
                missing++;
              } else {
                console.log(`OK music: ${day}.mp3 (${Math.round(size/1024)}KB)`);
              }
            }
          }

          if (missing > 0) {
            console.log(`${missing} music file(s) missing or corrupt.`);
            process.exit(1);
          }
          console.log('All music files OK');
          EOF

      - name: Download background videos from Pixabay
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs    = require('fs');
          const KEY   = process.env.PIXABAY_API_KEY;

          // Auto-read DAY_ASSETS from week info
          const info      = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));
          const DAY_ASSETS = info.dayAssets;

          console.log(`Downloading clips for: ${Object.keys(DAY_ASSETS).join(', ')}`);

          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function downloadFile(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const get = (u) => {
                https.get(u, res => {
                  if (res.statusCode === 301 || res.statusCode === 302) {
                    file.close();
                    return get(res.headers.location);
                  }
                  if (res.statusCode !== 200) {
                    reject(new Error('HTTP ' + res.statusCode));
                    return;
                  }
                  res.pipe(file);
                  file.on('finish', () => { file.close(); resolve(); });
                }).on('error', reject);
              };
              get(url);
            });
          }

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          (async () => {
            let downloaded = 0, skipped = 0, failed = 0;

            for (const [day, assets] of Object.entries(DAY_ASSETS)) {
              for (const item of assets) {
                const dest = 'public/videos/' + item.id + '.mp4';

                if (fs.existsSync(dest)) {
                  const size = fs.statSync(dest).size;
                  if (size > 50000) {
                    console.log('SKIP (exists): ' + item.id);
                    skipped++;
                    continue;
                  }
                  fs.unlinkSync(dest);
                  console.log('RE-DL (corrupt): ' + item.id);
                }

                let success = false;
                for (let attempt = 1; attempt <= 2; attempt++) {
                  try {
                    // Try with vertical orientation first, fallback without
                    const url = 'https://pixabay.com/api/videos/?key=' + KEY
                      + '&q=' + encodeURIComponent(item.q)
                      + '&orientation=vertical&per_page=10&video_type=film';
                    const data = await fetchJSON(url);
                    let hits = data.hits || [];

                    if (hits.length === 0) {
                      const fallback = await fetchJSON(
                        'https://pixabay.com/api/videos/?key=' + KEY
                        + '&q=' + encodeURIComponent(item.q)
                        + '&per_page=10&video_type=film'
                      );
                      hits = fallback.hits || [];
                    }

                    if (hits.length === 0) throw new Error('No results: ' + item.q);

                    for (const hit of hits) {
                      const videoUrl = hit.videos.medium
                        ? hit.videos.medium.url
                        : hit.videos.small.url;
                      try {
                        await downloadFile(videoUrl, dest);
                        const size = fs.statSync(dest).size;
                        if (size < 50000) throw new Error('File too small: ' + size + ' bytes');
                        console.log('OK: ' + item.id + ' (' + Math.round(size/1024) + 'KB)');
                        downloaded++;
                        success = true;
                        break;
                      } catch(e) {
                        if (fs.existsSync(dest)) fs.unlinkSync(dest);
                      }
                    }
                    if (success) break;
                  } catch(e) {
                    console.log('Attempt ' + attempt + ' FAILED ' + item.id + ': ' + e.message);
                    await sleep(2000);
                  }
                }

                if (!success) {
                  console.log('FINAL FAIL: ' + item.id);
                  failed++;
                }
              }
            }

            console.log('--- Download Summary ---');
            console.log('Downloaded: ' + downloaded);
            console.log('Skipped (cached): ' + skipped);
            console.log('Failed: ' + failed);

            if (failed > 0) process.exit(1);
          })();
          EOF

      - name: Render all videos
        run: |
          BROWSER="./node_modules/.remotion/chrome-headless-shell/linux64/chrome-headless-shell-linux64/chrome-headless-shell"

          # Support manual day override from workflow_dispatch input
          DAYS_INPUT="${{ github.event.inputs.days_override }}"
          if [ -n "$DAYS_INPUT" ]; then
            DAYS=$(echo "$DAYS_INPUT" | tr ',' ' ')
          else
            DAYS="${{ env.ACTIVE_DAYS }}"
          fi

          RENDER_FAILED=0
          RENDER_PASSED=0
          START_TIME=$(date +%s)

          for DAY in $DAYS; do
            DAY_START=$(date +%s)
            echo "--- Rendering ${DAY} ---"

            npx remotion render src/index.jsx ${DAY} out/${DAY}_final.mp4 \
              --browser-executable="$BROWSER" \
              --codec=h264 \
              --concurrency=2

            EXIT_CODE=$?
            DAY_END=$(date +%s)
            DAY_SECS=$((DAY_END - DAY_START))

            if [ $EXIT_CODE -eq 0 ] && [ -f "out/${DAY}_final.mp4" ]; then
              SIZE=$(du -sh "out/${DAY}_final.mp4" | cut -f1)
              echo "DONE ${DAY} in ${DAY_SECS}s (${SIZE})"
              RENDER_PASSED=$((RENDER_PASSED + 1))
            else
              echo "FAILED ${DAY} after ${DAY_SECS}s"
              RENDER_FAILED=1
            fi
          done

          END_TIME=$(date +%s)
          TOTAL_SECS=$((END_TIME - START_TIME))
          echo "--- Render complete in ${TOTAL_SECS}s | Passed: ${RENDER_PASSED} ---"

          exit $RENDER_FAILED

      - name: Install ffmpeg
        if: success()
        run: sudo apt-get install -y ffmpeg -q

      - name: Generate thumbnails
        if: success()
        run: |
          for DAY in ${{ env.ACTIVE_DAYS }}; do
            FILE="out/${DAY}_final.mp4"
            if [ -f "$FILE" ]; then
              ffmpeg -ss 00:00:01 -i "$FILE" -frames:v 1 -q:v 2 \
                "out/thumbs/${DAY}_thumb.jpg" -y -loglevel error \
                && echo "Thumb OK: ${DAY}" \
                || echo "Thumb FAILED: ${DAY}"
            fi
          done

      - name: Generate thumbnails from frame 60
        if: success()
        run: |
          node << 'EOF'
          const { execSync } = require('child_process');
          const fs   = require('fs');
          const info = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));
          const FPS  = 30;

          for (const day of info.days) {
            const input  = `out/${day}_final.mp4`;
            const output = `out/thumbs/${day}_thumb_f60.jpg`;
            if (!fs.existsSync(input)) continue;
            try {
              execSync(`ffmpeg -ss ${(60/FPS).toFixed(4)} -i "${input}" -frames:v 1 -q:v 1 "${output}" -y -loglevel error`);
              console.log(`Thumb f60 OK: ${day}`);
            } catch(e) {
              console.log(`Thumb f60 FAILED: ${day}: ${e.message}`);
            }
          }
          EOF

      - name: Generate GIF teasers hook frames 0-3sec
        if: success()
        run: |
          mkdir -p out/gifs
          for DAY in ${{ env.ACTIVE_DAYS }}; do
            FILE="out/${DAY}_final.mp4"
            if [ -f "$FILE" ]; then
              ffmpeg -t 3 -i "$FILE" \
                -vf "fps=12,scale=270:-1:flags=lanczos,palettegen" \
                -y "out/gifs/${DAY}_palette.png" -loglevel error && \
              ffmpeg -t 3 -i "$FILE" \
                -i "out/gifs/${DAY}_palette.png" \
                -lavfi "fps=12,scale=270:-1:flags=lanczos[x];[x][1:v]paletteuse" \
                -y "out/gifs/${DAY}_hook.gif" -loglevel error && \
              echo "GIF OK: ${DAY}" || echo "GIF FAILED: ${DAY}"
              rm -f "out/gifs/${DAY}_palette.png"
            fi
          done

      - name: Generate 3-second hook teaser clips
        if: success()
        run: |
          mkdir -p out/teasers
          for DAY in ${{ env.ACTIVE_DAYS }}; do
            FILE="out/${DAY}_final.mp4"
            if [ -f "$FILE" ]; then
              ffmpeg -t 3 -i "$FILE" \
                -c:v libx264 -crf 22 -preset fast \
                -c:a aac -b:a 128k \
                -y "out/teasers/${DAY}_teaser.mp4" -loglevel error && \
              echo "Teaser OK: ${DAY}" || echo "Teaser FAILED: ${DAY}"
            fi
          done

      - name: Generate SRT subtitle files
        if: success()
        run: |
          mkdir -p out/srt
          node << 'EOF'
          const fs   = require('fs');
          const path = require('path');
          const FPS  = 30;
          const info = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));

          function framesToSRT(frames) {
            const totalMs = Math.round((frames / FPS) * 1000);
            const h  = Math.floor(totalMs / 3600000);
            const m  = Math.floor((totalMs % 3600000) / 60000);
            const s  = Math.floor((totalMs % 60000) / 1000);
            const ms = totalMs % 1000;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
          }

          const srcDir = 'src';
          const contentFiles = fs.readdirSync(srcDir)
            .filter(f => f.match(/^week\d+-content\.js$/));
          const weekNums = contentFiles
            .map(f => parseInt(f.match(/week(\d+)/)[1]))
            .sort((a, b) => b - a);
          const activeFile = path.join(srcDir, `week${weekNums[0]}-content.js`);

          const source = fs.readFileSync(activeFile, 'utf8');
          const match  = source.match(/export\s+const\s+\w+\s*=\s*(\[[\s\S]*\]);/);
          let entries  = [];
          try { entries = eval(match[1]); } catch(e) {}

          let generated = 0;
          for (const entry of entries) {
            if (!entry.overlays || !entry.id) continue;
            const srtLines = [];
            let index = 1;
            for (const o of entry.overlays) {
              if (!o.text || !o.startFrame || !o.endFrame) continue;
              srtLines.push(String(index));
              srtLines.push(`${framesToSRT(o.startFrame)} --> ${framesToSRT(o.endFrame)}`);
              srtLines.push(o.text.replace(/\n/g, ' '));
              srtLines.push('');
              index++;
            }
            if (srtLines.length > 0) {
              fs.writeFileSync(`out/srt/${entry.id}.srt`, srtLines.join('\n'));
              console.log(`SRT OK: ${entry.id} (${index - 1} captions)`);
              generated++;
            }
          }
          console.log(`Generated ${generated} SRT files`);
          EOF

      - name: Generate YouTube chapter timestamps
        if: success()
        run: |
          mkdir -p out/chapters
          node << 'EOF'
          const fs   = require('fs');
          const path = require('path');
          const FPS  = 30;

          function framesToYTTime(frames) {
            const totalSecs = Math.floor(frames / FPS);
            const m = Math.floor(totalSecs / 60);
            const s = totalSecs % 60;
            return `${m}:${String(s).padStart(2,'0')}`;
          }

          const srcDir = 'src';
          const contentFiles = fs.readdirSync(srcDir)
            .filter(f => f.match(/^week\d+-content\.js$/));
          const weekNums = contentFiles
            .map(f => parseInt(f.match(/week(\d+)/)[1]))
            .sort((a, b) => b - a);
          const activeFile = path.join(srcDir, `week${weekNums[0]}-content.js`);

          const source = fs.readFileSync(activeFile, 'utf8');
          const match  = source.match(/export\s+const\s+\w+\s*=\s*(\[[\s\S]*\]);/);
          let entries  = [];
          try { entries = eval(match[1]); } catch(e) {}

          for (const entry of entries) {
            if (!entry.overlays || !entry.id) continue;
            const lines = ['0:00 Intro'];
            for (const o of entry.overlays) {
              if (!o.text || !o.startFrame) continue;
              const ts = framesToYTTime(o.startFrame);
              if (ts === '0:00') continue;
              lines.push(`${ts} ${o.text.replace(/\n/g, ' ').slice(0, 60)}`);
            }
            fs.writeFileSync(`out/chapters/${entry.id}_chapters.txt`, lines.join('\n'));
            console.log(`Chapters OK: ${entry.id} (${lines.length} chapters)`);
          }
          EOF

      - name: Batch rename outputs to DWB branded format
        if: success()
        run: |
          node << 'EOF'
          const fs    = require('fs');
          const path  = require('path');
          const TODAY = new Date().toISOString().slice(0, 10).replace(/-/g, '');
          const info  = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));

          let renamed = 0;
          for (const day of info.days) {
            const oldName = `${day}_final.mp4`;
            const dayStr  = day.replace('day', 'Day');
            const newName = `DWB_${dayStr}_${TODAY}_final.mp4`;
            const oldPath = path.join('out', oldName);
            const newPath = path.join('out', newName);
            if (fs.existsSync(oldPath) && !fs.existsSync(newPath)) {
              fs.copyFileSync(oldPath, newPath);
              console.log(`Renamed: ${oldName} -> ${newName}`);
              renamed++;
            }
          }
          console.log(`Batch rename: ${renamed} files`);
          EOF

      - name: Upload all export formats as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dwb-${{ env.ACTIVE_WEEK }}-all-exports-${{ github.run_number }}
          path: |
            out/*.mp4
            out/thumbs/*.jpg
            out/gifs/*.gif
            out/teasers/*.mp4
            out/srt/*.srt
            out/chapters/*.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: dwb-${{ env.ACTIVE_WEEK }}-videos-${{ github.run_number }}
          path: out/*.mp4
          retention-days: 14
          if-no-files-found: error

      - name: Upload thumbnails
        uses: actions/upload-artifact@v4
        with:
          name: dwb-${{ env.ACTIVE_WEEK }}-thumbs-${{ github.run_number }}
          path: out/thumbs/*.jpg
          retention-days: 14
          if-no-files-found: warn

      - name: Send completion notification
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs    = require('fs');

          const jobStatus = '${{ job.status }}';
          const runNumber = '${{ github.run_number }}';
          const isSuccess = jobStatus === 'success';

          let info = { week: 'unknown', days: [] };
          try { info = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8')); } catch(e) {}

          const STATUS = isSuccess ? 'COMPLETE' : 'FAILED';
          let passed   = 0;
          let lines    = [`DWB ${info.week.toUpperCase()} | Run #${runNumber} | ${STATUS}`, ''];

          for (const day of info.days) {
            const file = `out/${day}_final.mp4`;
            if (fs.existsSync(file)) {
              const size = Math.round(fs.statSync(file).size / (1024*1024) * 10) / 10;
              lines.push(`${day} OK - ${size}MB`);
              passed++;
            } else {
              lines.push(`${day} FAILED`);
            }
          }

          const total = info.days.length;
          lines.push('');
          lines.push(`Result: ${passed}/${total} rendered`);
          if (passed === total) lines.push('All videos ready for upload.');

          const message = lines.join('\n');
          const title   = `DWB ${isSuccess ? 'DONE' : 'FAILED'} - ${info.week} - ${passed}/${total}`;

          const options = {
            hostname: 'ntfy.sh',
            path: '/' + process.env.NTFY_TOPIC,
            method: 'POST',
            headers: {
              'Title':          title,
              'Priority':       isSuccess ? 'default' : 'high',
              'Tags':           isSuccess ? 'white_check_mark,clapper' : 'x,warning',
              'Content-Length': Buffer.byteLength(message),
            }
          };

          const req = https.request(options, res => {
            console.log('Notification sent: HTTP ' + res.statusCode);
          });
          req.on('error', e => console.log('Notification failed: ' + e.message));
          req.write(message);
          req.end();
          EOF
