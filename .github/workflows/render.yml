name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 9AM EAT
  workflow_dispatch:
    inputs:
      days_override:
        description: 'Specific days (e.g. day36,day37)'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install browser
        run: npx remotion browser ensure

      - name: Create directories
        run: mkdir -p public/videos public/music public/sfx out/thumbs

      - name: Download SFX
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const sfx = {
            whoosh: 'https://cdn.freesound.org/previews/416/416474_5121236-lq.mp3',
            impact: 'https://cdn.freesound.org/previews/321/321485_5260872-lq.mp3'
          };
          Object.entries(sfx).forEach(([name, url]) => {
            const file = fs.createWriteStream('public/sfx/' + name + '.mp3');
            https.get(url, res => res.pipe(file));
          });
          EOF

      - name: Detect active week
        run: |
          node << 'EOF'
          const fs = require('fs');
          const files = fs.readdirSync('src').filter(f => f.match(/^week\d+-content\.js$/));
          const latest = files.sort().pop();
          const content = fs.readFileSync('src/' + latest, 'utf8');
          const days = content.match(/id:\s*"(day\d+)"/g).map(d => d.split('"')[1]);
          fs.appendFileSync(process.env.GITHUB_ENV, 'ACTIVE_DAYS=' + days.join(' ') + '\n');
          EOF

      - name: Render videos
        run: |
          for DAY in $ACTIVE_DAYS; do
            npx remotion render src/index.jsx $DAY out/${DAY}_final.mp4 --codec=h264
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dwb-renders
          path: out/*.mp4
