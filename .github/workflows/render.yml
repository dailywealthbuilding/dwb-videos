name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install chrome-headless-shell
        run: npx remotion browser ensure

      - name: Download background videos from Pixabay
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          mkdir -p public/videos
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const PIXABAY_KEY = process.env.PIXABAY_API_KEY;
          const ASSETS = [
            { id: 'entrepreneur_laptop',  q: 'entrepreneur laptop' },
            { id: 'person_thinking',      q: 'person thinking' },
            { id: 'writing_notes',        q: 'writing notes' },
            { id: 'business_setup',       q: 'business setup' },
            { id: 'stopwatch_timer',      q: 'stopwatch timer' },
            { id: 'content_creator',      q: 'content creator' },
            { id: 'social_media_phone',   q: 'social media phone' },
            { id: 'business_statistics',  q: 'business statistics' },
            { id: 'small_business',       q: 'small business' },
            { id: 'laptop_income',        q: 'laptop income' },
            { id: 'frustrated_laptop',    q: 'frustrated laptop' },
            { id: 'desk_workspace',       q: 'desk workspace' },
            { id: 'phone_filming',        q: 'phone filming' },
            { id: 'clock_time',           q: 'clock time' },
            { id: 'calendar_planning',    q: 'calendar planning' },
          ];
          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => { try { resolve(JSON.parse(data)); } catch(e) { reject(e); } });
              }).on('error', reject);
            });
          }
          function downloadFile(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const get = (u) => {
                https.get(u, res => {
                  if (res.statusCode === 301 || res.statusCode === 302) {
                    file.close();
                    return get(res.headers.location);
                  }
                  if (res.statusCode !== 200) {
                    reject(new Error('HTTP ' + res.statusCode + ' for ' + u));
                    return;
                  }
                  res.pipe(file);
                  file.on('finish', () => { file.close(); resolve(); });
                }).on('error', reject);
              };
              get(url);
            });
          }
          (async () => {
            let failed = 0;
            for (const item of ASSETS) {
              const dest = 'public/videos/' + item.id + '.mp4';
              if (fs.existsSync(dest)) {
                console.log('Already exists: ' + item.id);
                continue;
              }
              try {
                const url = 'https://pixabay.com/api/videos/?key=' + PIXABAY_KEY + '&q=' + encodeURIComponent(item.q) + '&per_page=5&video_type=film';
                const data = await fetchJSON(url);
                if (!data.hits || data.hits.length === 0) throw new Error('No results for: ' + item.q);
                let downloaded = false;
                for (const hit of data.hits) {
                  const videoUrl = hit.videos.medium.url;
                  try {
                    await downloadFile(videoUrl, dest);
                    const size = fs.statSync(dest).size;
                    if (size < 10000) throw new Error('File too small: ' + size);
                    console.log('âœ… ' + item.id + ' (' + Math.round(size/1024) + 'KB)');
                    downloaded = true;
                    break;
                  } catch(e) {
                    if (fs.existsSync(dest)) fs.unlinkSync(dest);
                  }
                }
                if (!downloaded) { console.log('âŒ All hits failed: ' + item.id); failed++; }
              } catch(e) {
                console.log('âŒ ' + item.id + ': ' + e.message);
                failed++;
              }
            }
            if (failed > 0) process.exit(1);
          })();
          EOF

      - name: Render all videos
        run: |
          BROWSER="./node_modules/.remotion/chrome-headless-shell/linux64/chrome-headless-shell-linux64/chrome-headless-shell"
          mkdir -p out
          FAILED=0
          for DAY in day29 day30 day31 day32 day33 day34 day35; do
            echo "âš™ Rendering ${DAY}..."
            npx remotion render src/index.jsx ${DAY} out/${DAY}_final.mp4 \
              --browser-executable="$BROWSER" \
              --codec=h264 \
            && echo "âœ… ${DAY} done" || { echo "âŒ ${DAY} FAILED"; FAILED=1; }
          done
          exit $FAILED

      - name: Upload rendered videos as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dwb-videos-${{ github.run_number }}
          path: out/*.mp4
          retention-days: 7
          if-no-files-found: error
