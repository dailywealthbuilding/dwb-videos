name: Render Week 4 Videos

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      video_id:
        description: "Render one video (e.g. day22) or leave blank for ALL"
        required: false
        default: ""

jobs:
  render:
    name: Render Videos with Remotion
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Upload videos to Cloudinary
        run: |
         npm install cloudinary
         node -e "
         const cloudinary = require('cloudinary').v2;
         cloudinary.config({
         cloud_name: process.env.CLOUDINARY_CLOUD_NAME,
         api_key: process.env.CLOUDINARY_API_KEY,
         api_secret: process.env.CLOUDINARY_API_SECRET
         });
         const videos = [
         { id: '3194038', url: 'https://cdn.pixabay.com/video/2022/01/14/104990-666013983_large.mp4' },
         { id: '3252459', url: 'https://cdn.pixabay.com/video/2021/04/05/69980-535193837_large.mp4' },
         { id: '4065982', url: 'https://cdn.pixabay.com/video/2020/07/30/46178-444449092_large.mp4' },
         { id: '6985580', url: 'https://cdn.pixabay.com/video/2023/03/15/154980-808808808_large.mp4' },
         { id: '4481316', url: 'https://cdn.pixabay.com/video/2021/08/03/82888-582888582_large.mp4' },
         { id: '3196007', url: 'https://cdn.pixabay.com/video/2022/02/10/107990-677677677_large.mp4' },
         { id: '8371648', url: 'https://cdn.pixabay.com/video/2023/06/20/168980-838838838_large.mp4' },
         ];
         Promise.all(videos.map(v =>
         cloudinary.uploader.upload(v.url, {
         public_id: v.id, resource_type: 'video', overwrite: false
         }).then(() => console.log('✅ ' + v.id + ' uploaded'))
         .catch(e => console.log('⚠️ ' + v.id + ' skipped: ' + e.message))
         ));
         "
        env:
         CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
         CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
         CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          
      - name: Install Chrome dependencies
        run: |
           sudo apt-get update -qq
           sudo apt-get install -y wget gnupg \
           libnss3 libatk-bridge2.0-0 \
           libcups2 libdrm2 libxcomposite1 libxdamage1 \
           libxrandr2 libgbm1
           wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
           sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
    
      - name: Create output directory
        run: mkdir -p output
        
      - name: Render videos
        run: |
          npx remotion browser ensure --browser-executable=$(which google-chrome-stable)
          export CHROME_FLAGS="--headless=new"
          if [ -z "${{ github.event.inputs.video_id }}" ]; then
            node render-all.js
          else
            npx remotion render src/index.jsx \
              ${{ github.event.inputs.video_id }} \
              output/${{ github.event.inputs.video_id }}_final.mp4 \
              --codec=h264 --quality=85
          fi
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          REMOTION_CHROME_FLAGS: "--headless=new"

      - name: Upload rendered videos
        uses: actions/upload-artifact@v4
        with:
          name: week4-videos-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: error
