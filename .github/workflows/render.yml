name: Render DWB Videos

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6AM UTC = 9AM EAT
  workflow_dispatch:
    inputs:
      days_override:
        description: 'Specific days only, comma-separated (e.g. day36,day37). Leave blank to auto-detect.'
        required: false
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install chrome-headless-shell
        run: npx remotion browser ensure

      - name: Create required directories
        run: |
          mkdir -p public/videos
          mkdir -p public/music
          mkdir -p public/sfx
          mkdir -p out
          mkdir -p out/thumbs
          mkdir -p out/gifs
          mkdir -p out/teasers
          mkdir -p out/srt
          mkdir -p out/chapters

      - name: Download SFX (Mixkit fresh random per render)
        run: |
          node << 'EOF'
          const https = require('https');
          const fs    = require('fs');

          const SFX_POOLS = {
            'whoosh': [
              'https://assets.mixkit.co/sfx/preview/mixkit-fast-small-sweep-transition-166.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-arrow-whoosh-1491.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-cinematic-fast-whoosh-transition-1780.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-swoosh-and-thud-2257.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-wind-howl-whoosh-ambience-232.mp3',
            ],
            'impact': [
              'https://assets.mixkit.co/sfx/preview/mixkit-cinematic-impact-hit-1455.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-dramatic-cinematic-impact-2897.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-cinematic-tension-hit-2898.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-drum-and-bass-kick-2297.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-electric-bass-hit-2873.mp3',
            ],
            'cheer': [
              'https://assets.mixkit.co/sfx/preview/mixkit-stadium-crowd-cheer-476.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-small-crowd-applause-521.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-crowd-cheer-and-applause-518.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-audience-light-applause-479.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-crowd-short-cheer-510.mp3',
            ],
            'ping': [
              'https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3',
              'https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3',
            ],
          };

          function download(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const get = (u) => {
                https.get(u, { headers: { 'User-Agent': 'DWB-Pipeline/1.0' } }, res => {
                  if (res.statusCode === 301 || res.statusCode === 302) {
                    file.close(); return get(res.headers.location);
                  }
                  if (res.statusCode !== 200) { file.close(); reject(new Error('HTTP ' + res.statusCode)); return; }
                  res.pipe(file);
                  file.on('finish', () => { file.close(); resolve(); });
                }).on('error', e => { file.close(); reject(e); });
              };
              get(url);
            });
          }

          (async () => {
            for (const [slot, pool] of Object.entries(SFX_POOLS)) {
              const dest = 'public/sfx/' + slot + '.mp3';
              if (fs.existsSync(dest)) fs.unlinkSync(dest);
              const shuffled = [...pool].sort(() => Math.random() - 0.5);
              let success = false;
              for (const url of shuffled) {
                try {
                  await download(url, dest);
                  const size = fs.existsSync(dest) ? fs.statSync(dest).size : 0;
                  if (size > 5000) {
                    console.log('SFX OK: ' + slot + '.mp3 (' + Math.round(size/1024) + 'KB)');
                    success = true; break;
                  }
                  if (fs.existsSync(dest)) fs.unlinkSync(dest);
                } catch(e) {
                  if (fs.existsSync(dest)) fs.unlinkSync(dest);
                }
              }
              if (!success) console.log('WARNING: Could not download ' + slot + '.mp3');
            }
            console.log('SFX download complete');
          })();
          EOF

      - name: Detect active week from content files
        run: |
          node << 'EOF'
          const fs   = require('fs');
          const path = require('path');

          const srcDir = 'src';
          const contentFiles = fs.readdirSync(srcDir)
            .filter(f => f.match(/^week\d+-content\.js$/));

          if (contentFiles.length === 0) {
            console.log('ERROR: No week content files found in src/');
            process.exit(1);
          }

          const weekNums = contentFiles
            .map(f => parseInt(f.match(/week(\d+)/)[1]))
            .sort((a, b) => b - a);
          const activeWeek = weekNums[0];
          const activeFile = path.join(srcDir, 'week' + activeWeek + '-content.js');

          console.log('Active week file: ' + activeFile);

          const source = fs.readFileSync(activeFile, 'utf8');

          let entries = [];
          const defaultMatch = source.match(/export\s+default\s+(\[[\s\S]*\]);?\s*$/m);
          const namedMatch   = source.match(/export\s+const\s+\w+\s*=\s*(\[[\s\S]*?\]);\s*(?=export|$)/m);
          const arrayStr     = defaultMatch ? defaultMatch[1] : (namedMatch ? namedMatch[1] : null);

          if (!arrayStr) {
            console.log('ERROR: Could not parse content array from ' + activeFile);
            process.exit(1);
          }

          try { entries = eval(arrayStr); } catch(e) {
            console.log('ERROR: eval failed: ' + e.message);
            process.exit(1);
          }

          const days = entries.map(e => e.id).filter(Boolean);
          console.log('Days detected: ' + days.join(', '));

          const dayAssets = {};
          for (const entry of entries) {
            if (!entry.id || !entry.pexelsSearchTerms) continue;
            dayAssets[entry.id] = entry.pexelsSearchTerms
              .slice(0, 4)
              .map((q, i) => ({ id: entry.id + '_clip' + (i + 1), q }));
          }

          const dayMeta = {};
          for (const entry of entries) {
            if (!entry.id) continue;
            dayMeta[entry.id] = {
              youtubeTitle:       entry.youtubeTitle       || '',
              youtubeDescription: entry.youtubeDescription || '',
              tiktokCaption:      entry.tiktokCaption      || '',
              pinnedComment:      entry.pinnedComment      || '',
              music:              entry.music              || '',
              musicMood:          entry.musicMood          || '',
            };
          }

          fs.mkdirSync('out', { recursive: true });
          fs.writeFileSync('out/.week_info.json', JSON.stringify({
            week: 'week' + activeWeek,
            days,
            dayAssets,
            dayMeta,
          }, null, 2));

          const envFile = process.env.GITHUB_ENV;
          if (envFile) {
            fs.appendFileSync(envFile, 'ACTIVE_WEEK=week' + activeWeek + '\n');
            fs.appendFileSync(envFile, 'ACTIVE_DAYS=' + days.join(' ') + '\n');
          }

          console.log('Active week: week' + activeWeek);
          console.log('Week info written to out/.week_info.json');
          EOF

      - name: Download music per day (Jamendo trending -> FMA -> Pixabay -> prev track)
        env:
          JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');
          const http  = require('http');
          const fs    = require('fs');

          const JAMENDO_KEY = process.env.JAMENDO_CLIENT_ID;
          const PIXABAY_KEY = process.env.PIXABAY_API_KEY;

          const info    = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));
          const days    = info.days;
          const dayMeta = info.dayMeta || {};

          const DAY_MOODS = {
            29:'emotional',30:'upbeat',31:'motivational',32:'electronic',
            33:'relaxing',34:'powerful',35:'calm',36:'powerful',
            37:'calm',38:'dramatic',39:'upbeat',40:'inspiring',
            41:'powerful',42:'calm',43:'motivational',44:'emotional',
            45:'upbeat',46:'powerful',47:'relaxing',48:'inspiring',
            49:'calm',50:'upbeat',51:'motivational',52:'powerful',
            53:'electronic',54:'inspiring',55:'upbeat',56:'powerful',
            57:'calm',58:'electronic',59:'motivational',60:'upbeat',
            61:'powerful',62:'inspiring',63:'calm',64:'powerful',
            65:'motivational',66:'upbeat',67:'dramatic',68:'inspiring',
            69:'calm',70:'powerful',71:'upbeat',72:'motivational',
            73:'powerful',74:'calm',75:'inspiring',76:'electronic',
            77:'upbeat',78:'powerful',79:'motivational',80:'dramatic',
            81:'inspiring',82:'calm',83:'upbeat',84:'powerful',
            85:'motivational',86:'inspiring',87:'dramatic',88:'powerful',
            89:'upbeat',90:'inspiring',
          };

          const JAMENDO_TAGS = {
            motivational:'motivational+upbeat', upbeat:'happy+upbeat',
            powerful:'powerful+dramatic', calm:'relaxing+ambient',
            emotional:'emotional+piano', electronic:'electronic+techno',
            relaxing:'relaxing+chill', dramatic:'dramatic+epic',
            inspiring:'inspiring+uplifting',
          };

          const PIXABAY_MOODS = {
            motivational:'upbeat', upbeat:'upbeat', powerful:'powerful',
            calm:'relaxing', emotional:'emotional', electronic:'electronic',
            relaxing:'relaxing', dramatic:'dramatic', inspiring:'inspiring',
          };

          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              const lib = url.startsWith('https') ? https : http;
              lib.get(url, { headers: { 'User-Agent': 'DWB-Pipeline/1.0' } }, res => {
                if (res.statusCode === 301 || res.statusCode === 302)
                  return fetchJSON(res.headers.location).then(resolve).catch(reject);
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error('JSON parse failed')); }
                });
              }).on('error', reject);
            });
          }

          function downloadFile(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const get = (u) => {
                const lib = u.startsWith('https') ? https : http;
                lib.get(u, { headers: { 'User-Agent': 'DWB-Pipeline/1.0' } }, res => {
                  if (res.statusCode === 301 || res.statusCode === 302) {
                    file.close(); return get(res.headers.location);
                  }
                  if (res.statusCode !== 200) {
                    file.close(); reject(new Error('HTTP ' + res.statusCode)); return;
                  }
                  res.pipe(file);
                  file.on('finish', () => { file.close(); resolve(); });
                }).on('error', e => { file.close(); reject(e); });
              };
              get(url);
            });
          }

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function tryJamendo(mood, dest) {
            if (!JAMENDO_KEY) return false;
            try {
              const tag  = JAMENDO_TAGS[mood] || 'motivational+upbeat';
              const url  = 'https://api.jamendo.com/v3.0/tracks/' +
                '?client_id=' + JAMENDO_KEY +
                '&format=json&limit=10&tags=' + tag +
                '&order=popularity_week&audioformat=mp32&license_cc=1';
              const data   = await fetchJSON(url);
              const tracks = (data.results || []).filter(t => t.audio);
              if (tracks.length === 0) throw new Error('No results for: ' + tag);
              const pick = tracks[Math.floor(Math.random() * Math.min(5, tracks.length))];
              console.log('Jamendo: "' + pick.name + '" by ' + pick.artist_name);
              await downloadFile(pick.audio, dest);
              const size = fs.statSync(dest).size;
              if (size < 50000) throw new Error('File too small: ' + size);
              console.log('Jamendo OK: ' + Math.round(size/1024) + 'KB');
              return true;
            } catch(e) {
              console.log('Jamendo failed: ' + e.message);
              if (fs.existsSync(dest)) fs.unlinkSync(dest);
              return false;
            }
          }

          async function tryFMA(mood, dest) {
            try {
              const genreMap = {
                motivational:'Hip-Hop', upbeat:'Pop', powerful:'Classical',
                calm:'Ambient', emotional:'Classical', electronic:'Electronic',
                relaxing:'Ambient', dramatic:'Classical', inspiring:'Pop',
              };
              const genre = genreMap[mood] || 'Pop';
              const url   = 'https://freemusicarchive.org/api/get/tracks.json' +
                '?genre_title=' + encodeURIComponent(genre) +
                '&limit=10&sort_by=track_listens&sort_dir=desc&api_key=60BLHNQCAOUFPIBZ';
              const data   = await fetchJSON(url);
              const tracks = (data.dataset || []).filter(t => t.track_url);
              if (tracks.length === 0) throw new Error('No results for: ' + genre);
              for (const track of tracks.slice(0, 5)) {
                try {
                  await downloadFile(track.track_url, dest);
                  const size = fs.existsSync(dest) ? fs.statSync(dest).size : 0;
                  if (size > 50000) {
                    console.log('FMA OK: "' + track.track_title + '" — ' + Math.round(size/1024) + 'KB');
                    return true;
                  }
                  if (fs.existsSync(dest)) fs.unlinkSync(dest);
                } catch(e) { /* try next */ }
              }
              throw new Error('All FMA tracks failed');
            } catch(e) {
              console.log('FMA failed: ' + e.message);
              if (fs.existsSync(dest)) fs.unlinkSync(dest);
              return false;
            }
          }

          async function tryPixabay(mood, dest) {
            if (!PIXABAY_KEY) return false;
            try {
              const pmood = PIXABAY_MOODS[mood] || 'upbeat';
              const url   = 'https://pixabay.com/api/videos/music/?key=' + PIXABAY_KEY +
                '&mood=' + pmood + '&per_page=10';
              const data = await fetchJSON(url);
              const hits = (data.hits || []).filter(h => h.audio);
              if (hits.length === 0) throw new Error('No results for mood: ' + pmood);
              const pick = hits[Math.floor(Math.random() * Math.min(5, hits.length))];
              console.log('Pixabay: "' + pick.title + '"');
              await downloadFile(pick.audio, dest);
              const size = fs.statSync(dest).size;
              if (size < 50000) throw new Error('File too small: ' + size);
              console.log('Pixabay OK: ' + Math.round(size/1024) + 'KB');
              return true;
            } catch(e) {
              console.log('Pixabay music failed: ' + e.message);
              if (fs.existsSync(dest)) fs.unlinkSync(dest);
              return false;
            }
          }

          (async () => {
            let downloaded = 0, skipped = 0, failed = 0;
            const results = [];

            for (const day of days) {
              const dest = 'public/music/' + day + '.mp3';

              if (fs.existsSync(dest) && fs.statSync(dest).size > 50000) {
                console.log('SKIP (cached): ' + day + '.mp3');
                skipped++;
                results.push({ day, status: 'cached' });
                continue;
              }
              if (fs.existsSync(dest)) fs.unlinkSync(dest);

              const dayNum = parseInt(day.replace('day', ''));
              const mood   = (dayMeta[day] && dayMeta[day].musicMood) || DAY_MOODS[dayNum] || 'motivational';
              console.log('\n--- ' + day + ' | mood: ' + mood + ' ---');

              let ok = await tryJamendo(mood, dest);
              if (!ok) { await sleep(1000); ok = await tryFMA(mood, dest); }
              if (!ok) { await sleep(1000); ok = await tryPixabay(mood, dest); }

              if (!ok) {
                let prev = dayNum - 1;
                while (prev >= 1) {
                  const pf = 'public/music/day' + prev + '.mp3';
                  if (fs.existsSync(pf) && fs.statSync(pf).size > 50000) {
                    fs.copyFileSync(pf, dest);
                    console.log(day + ': copied day' + prev + '.mp3 as last resort');
                    ok = true; break;
                  }
                  prev--;
                }
              }

              if (ok) { downloaded++; results.push({ day, status: 'downloaded', mood }); }
              else    { failed++;    results.push({ day, status: 'failed', mood });
                        console.log('FINAL FAIL: ' + day); }

              await sleep(500);
            }

            fs.writeFileSync('out/.music_results.json', JSON.stringify(results, null, 2));
            console.log('\n--- Music Summary ---');
            console.log('Downloaded: ' + downloaded + ' | Cached: ' + skipped + ' | Failed: ' + failed);

            if (failed > 0 && failed === days.length) {
              console.log('CRITICAL: All music failed'); process.exit(1);
            }
          })();
          EOF

      - name: Fetch TikTok trending sounds (weekly inspiration)
        continue-on-error: true
        run: |
          node << 'EOF'
          const https = require('https');
          const fs    = require('fs');

          const ENDPOINTS = [
            'https://www.tiktok.com/api/creative_center/music/trending/?aid=1988&count=10&period=7&page=1',
            'https://ads.tiktok.com/creative_radar_api/v1/popular_trend/music/list?period=7&page=1&limit=10',
          ];

          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              https.get(url, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Accept': 'application/json',
                  'Referer': 'https://ads.tiktok.com/',
                }
              }, res => {
                if (res.statusCode === 301 || res.statusCode === 302)
                  return fetchJSON(res.headers.location).then(resolve).catch(reject);
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error('Not JSON')); }
                });
              }).on('error', reject);
            });
          }

          (async () => {
            let sounds = [];
            for (const url of ENDPOINTS) {
              try {
                const data  = await fetchJSON(url);
                const items = data?.data?.list || data?.music_list || data?.data?.music_list || [];
                if (items.length > 0) {
                  sounds = items.slice(0, 10).map((item, i) => ({
                    rank: i + 1,
                    title:      item.music_info?.title  || item.title  || 'Trending #' + (i+1),
                    artist:     item.music_info?.author || item.author || 'Unknown',
                    usageCount: item.post_num || item.use_count || '--',
                    soundId:    item.music_id || item.id || null,
                    scrapedAt:  new Date().toISOString(),
                  }));
                  console.log('Fetched ' + sounds.length + ' trending sounds');
                  break;
                }
              } catch(e) { console.log('TikTok endpoint failed: ' + e.message); }
            }

            fs.writeFileSync('out/.trending_sounds.json', JSON.stringify(sounds, null, 2));

            if (sounds.length > 0) {
              console.log('\nTop 5 Trending This Week:');
              sounds.slice(0, 5).forEach(s =>
                console.log('  ' + s.rank + '. ' + s.title + ' -- ' + s.artist + ' (' + s.usageCount + ' videos)')
              );
            } else {
              console.log('No trending sounds fetched (TikTok API may have rotated)');
            }
          })();
          EOF

      - name: Run pre-render validator
        run: |
          if [ -f "validate.js" ]; then
            node validate.js && echo "Validation passed" || exit 1
          else
            echo "validate.js not found - skipping"
          fi

      - name: Download background videos (Pixabay + Unsplash fallback)
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          node << 'EOF'
          const https    = require('https');
          const http     = require('http');
          const fs       = require('fs');
          const path     = require('path');
          const { execSync } = require('child_process');

          const PIXABAY_KEY  = process.env.PIXABAY_API_KEY;
          const UNSPLASH_KEY = process.env.UNSPLASH_ACCESS_KEY || '';

          const info       = JSON.parse(fs.readFileSync('out/.week_info.json', 'utf8'));
          const DAY_ASSETS = info.dayAssets;

          console.log('Downloading clips for: ' + Object.keys(DAY_ASSETS).join(', '));

          function fetchJSON(url) {
            return new Promise((resolve, reject) => {
              const lib = url.startsWith('https') ? https : http;
              lib.get(url, { headers: { 'User-Agent': 'DWB-Pipeline/1.0' } }, res => {
                if (res.statusCode === 301 || res.statusCode === 302) {
                  return fetchJSON(res.headers.location).then(resolve).catch(reject);
                }
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } catch(e) { reject(new Error('JSON parse failed: ' + data.slice(0, 200))); }
                });
              }).on('error', reject);
            });
          }

          function downloadFile(url, dest) {
            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(dest);
              const get  = (u) => {
                const lib = u.startsWith('https') ? https : http;
                lib.get(u, { headers: { 'User-Agent': 'DWB-Pipeline/1.0' } }, res => {
                  if (res.statusCode === 301 || res.statusCode === 302) {
                    file.close();
                    return get(res.headers.location);
                  }
                  if (res.statusCode !== 200) {
                    file.close();
                    reject(new Error('HTTP ' + res.statusCode + ' for ' + u));
                    return;
                  }
                  res.pipe(file);
                  file.on('finish', () => { file.close(); resolve(); });
                }).on('error', err => { file.close(); reject(err); });
              };
              get(url);
            });
          }

          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function makeKenBurnsFromImage(imgUrl, dest, query) {
            const tmpImg = dest + '_tmp.jpg';
            try {
              await downloadFile(imgUrl, tmpImg);
              const size = fs.existsSync(tmpImg) ? fs.statSync(tmpImg).size : 0;
              if (size < 5000) throw new Error('Image too small: ' + size);

              execSync(
                'ffmpeg -loop 1 -i "' + tmpImg + '" ' +
                '-vf "scale=1920:3840,zoompan=z=\'min(zoom+0.0008,1.3)\':x=\'iw/2-(iw/zoom/2)\':y=\'ih/2-(ih/zoom/2)\':d=240:s=1080x1920:fps=30" ' +
                '-t 8 -c:v libx264 -pix_fmt yuv420p -crf 23 -preset fast ' +
                '"' + dest + '" -y -loglevel error',
                { stdio: 'pipe' }
              );

              const outSize = fs.existsSync(dest) ? fs.statSync(dest).size : 0;
              if (outSize < 50000) throw new Error('Ken Burns output too small: ' + outSize);

              console.log('Ken Burns OK: ' + path.basename(dest) + ' (' + Math.round(outSize/1024) + 'KB)');
              return true;
            } catch(e) {
              console.log('Ken Burns FAILED: ' + e.message);
              return false;
            } finally {
              if (fs.existsSync(tmpImg)) fs.unlinkSync(tmpImg);
            }
          }

          async function tryUnsplash(query, dest) {
            try {
              const cleanQ = encodeURIComponent(query.replace(/vertical/gi, '').trim());
              if (!UNSPLASH_KEY) {
                return await makeKenBurnsFromImage('https://source.unsplash.com/1080x1920/?' + cleanQ, dest, query);
              }
              const url    = 'https://api.unsplash.com/search/photos?query=' + cleanQ + '&per_page=3&orientation=portrait&client_id=' + UNSPLASH_KEY;
              const data   = await fetchJSON(url);
              const results = data.results || [];
              if (results.length === 0) throw new Error('No Unsplash results for: ' + query);
              const imgUrl = results[0].urls.regular || results[0].urls.small;
              return await makeKenBurnsFromImage(imgUrl, dest, query);
            } catch(e) {
              console.log('Unsplash fallback FAILED: ' + e.message);
              return false;
            }
          }

          (async () => {
            let downloaded = 0, skipped = 0, failed = 0, kenBurns = 0;

            for (const [day, assets] of Object.entries(DAY_ASSETS)) {
              for (const item of assets) {
                const dest = 'public/videos/' + item.id + '.mp4';

                if (fs.existsSync(dest)) {
                  const size = fs.statSync(dest).size;
                  if (size > 50000) {
                    console.log('SKIP (cached): ' + item.id);
                    skipped++;
                    continue;
                  }
                  fs.unlinkSync(dest);
                  console.log('RE-DL (corrupt): ' + item.id);
                }

                let success = false;

                for (let attempt = 1; attempt <= 2 && !success; attempt++) {
                  try {
                    const urlV = 'https://pixabay.com/api/videos/?key=' + PIXABAY_KEY
                      + '&q=' + encodeURIComponent(item.q)
                      + '&orientation=vertical&per_page=10&video_type=film';
                    let data = await fetchJSON(urlV);
                    let hits = data.hits || [];

                    if (hits.length === 0) {
                      const urlA = 'https://pixabay.com/api/videos/?key=' + PIXABAY_KEY
                        + '&q=' + encodeURIComponent(item.q)
                        + '&per_page=10&video_type=film';
                      data = await fetchJSON(urlA);
                      hits = data.hits || [];
                    }

                    if (hits.length === 0) throw new Error('No Pixabay results: ' + item.q);

                    for (const hit of hits) {
                      const videoUrl = (hit.videos.medium || hit.videos.small || hit.videos.large || {}).url;
                      if (!videoUrl) continue;
                      try {
                        await downloadFile(videoUrl, dest);
                        const size = fs.statSync(dest).size;
                        if (size < 50000) throw new Error('File too small: ' + size);
                        console.log('OK (Pixabay): ' + item.id + ' (' + Math.round(size/1024) + 'KB)');
                        downloaded++;
                        success = true;
                        break;
                      } catch(e) {
                        if (fs.existsSync(dest)) fs.unlinkSync(dest);
                      }
                    }
                    if (success) break;
                  } catch(e) {
                    console.log('Pixabay attempt ' + attempt + ' FAILED ' + item.id + ': ' + e.message);
                    if (attempt < 2) await sleep(3000);
                  }
                }

                if (!success) {
                  console.log('Pixabay exhausted -- trying Unsplash Ken Burns: ' + item.id);
                  const kbOk = await tryUnsplash(item.q, dest);
                  if (kbOk) { success = true; kenBurns++; }
                }

                if (!success) { console.log('FINAL FAIL: ' + item.id); failed++; }

                await sleep(500);
              }
            }

            console.log('\n--- Video Download Summary ---');
            console.log('Pixabay: ' + downloaded + ' | Ken Burns: ' + kenBurns + ' | Cached: ' + skipped + ' | Failed: ' + failed);
            if (failed > 0) console.log('WARNING: ' + failed + ' clip(s) failed. Render may have blank backgrounds.');
          })();
          EOF

      - name: Render all videos
        run: |
          BROWSER="./node_modules/.remotion/chrome-headless-shell/linux64/chrome-headless-shell-linux64/chrome-headless-shell"

          DAYS_INPUT="${{ github.event.inputs.days_override }}"
          if [ -n "$DAYS_INPUT" ]; then
            RENDER_DAYS=$(echo "$DAYS_INPUT" | tr ',' ' ')
          else
            RENDER_DAYS="${{ env.ACTIVE_DAYS }}"
          fi

          echo "Rendering days: $RENDER_DAYS"

          RENDER_FAILED=0
          RENDER_PASSED=0
          START_TIME=$(date +%s)

          for DAY in $RENDER_DAYS; do
            DAY_START=$(date +%s)
            echo "--- Rendering ${DAY} ---"

            npx remotion render src/index.jsx ${DAY} out/${DAY}_final.mp4 \
              --browser-executable="$BROWSER" \
              --codec=h264 \
              --concurrency=2

            EXIT_CODE=$?
            DAY_END=$(date +%s)
            DAY_SECS=$((DAY_END - DAY_START))

            if [ $EXIT_CODE -eq 0 ] && [ -f "out/${DAY}_final.mp4" ]; then
              SIZE=$(du -sh "out/${DAY}_final.mp4" | cut -f1)
              echo "DONE ${DAY} in ${DAY_SECS}s (${SIZE})"
              RENDER_PASSED=$((RENDER_PASSED + 1))
            else
              echo "FAILED ${DAY} after ${DAY_SECS}s"
              RENDER_FAILED=$((RENDER_FAILED + 1))
            fi
          done

          END_TIME=$(date +%s)
          TOTAL_SECS=$((END_TIME - START_TIME))
          echo "--- Render complete in ${TOTAL_SECS}s | Passed: ${RENDER_PASSED} | Failed: ${RENDER_FAILED} ---"

          if [ $RENDER_FAILED -gt 0 ]; then exit 1; fi

