name: Competitor Video Tracker

# Runs every Saturday 3PM UTC = 6PM EAT (before content generation)
# Tracks top finance channels' latest uploads via YouTube Data API v3
# Analyzes trends and gaps using Groq AI
# Saves report to competitor-report.json and sends ntfy summary

on:
  schedule:
    - cron: '0 15 * * 6'
  workflow_dispatch: {}

jobs:
  competitor-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Track competitors and find content gaps
        env:
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          NTFY_TOPIC:           ${{ secrets.NTFY_TOPIC }}
        run: |
          node << 'COMPETITOREOF'
          const https = require('https');
          const fs    = require('fs');

          const YT_KEY   = process.env.YOUTUBE_DATA_API_KEY || '';
          const GROQ_KEY = process.env.GROQ_API_KEY         || '';
          const NTFY     = process.env.NTFY_TOPIC            || '';

          function safeTitle(s) {
            return (s || '').replace(/[^\x20-\x7E]/g, '').replace(/\s+/g, ' ').trim().slice(0, 100);
          }

          // Top personal finance channels to track
          // Using official channel IDs -- no scraping needed
          const COMPETITORS = [
            { id: 'UCL8w_A8p8P1HozDIpZIS0UA', name: 'Graham Stephan' },
            { id: 'UCHnyfMqiRRG1u-2MsSQLbXA', name: 'Veritasium' },
            { id: 'UCVtFOytbRpEvzLjvqGG5gxQ', name: 'Andrei Jikh' },
            { id: 'UCCZFQSS_qxCmgMBe4FcSo3w', name: 'Mark Tilbury' },
            { id: 'UCqK_GSMbpiV8spgD3ZGloSw', name: 'Humphrey Yang' },
          ];

          function httpsRequest(options) {
            return new Promise(function(resolve, reject) {
              https.get(options, function(res) {
                let data = '';
                res.on('data', function(d) { data += d; });
                res.on('end', function() { resolve({ status: res.statusCode, body: data }); });
              }).on('error', reject);
            });
          }

          function sendNtfy(message, title, priority) {
            if (!NTFY) return Promise.resolve();
            const data = Buffer.from(message);
            return new Promise(function(resolve) {
              const req = https.request({
                hostname: 'ntfy.sh', port: 443, path: '/' + NTFY, method: 'POST',
                headers: {
                  'Content-Type': 'text/plain', 'Content-Length': data.length,
                  'Title': safeTitle(title), 'Tags': 'eyes,chart_with_upwards_trend',
                  'Priority': priority || 'default',
                },
              }, function(res) { console.log('ntfy: ' + res.statusCode); resolve(); });
              req.on('error', function() { resolve(); });
              req.write(data); req.end();
            });
          }

          async function fetchRecentVideos(channelId, channelName) {
            if (!YT_KEY) return [];
            try {
              const path = '/youtube/v3/search?part=snippet&channelId=' + channelId +
                '&type=video&order=date&maxResults=5&key=' + YT_KEY;
              const res  = await httpsRequest({ hostname: 'www.googleapis.com', path: path, method: 'GET' });
              if (res.status !== 200) { console.log(channelName + ': HTTP ' + res.status); return []; }
              const data = JSON.parse(res.body);
              return (data.items || []).map(function(item) {
                return {
                  channel: channelName,
                  title:   (item.snippet || {}).title       || '',
                  date:    ((item.snippet || {}).publishedAt || '').slice(0, 10),
                  videoId: (item.id || {}).videoId           || '',
                  url:     'https://youtu.be/' + ((item.id || {}).videoId || ''),
                };
              });
            } catch(e) {
              console.log('Failed ' + channelName + ': ' + e.message);
              return [];
            }
          }

          async function analyzeWithGroq(videos) {
            if (!GROQ_KEY || videos.length === 0) return null;
            try {
              const videoList = videos.map(function(v) {
                return '- [' + v.channel + '] "' + v.title + '" (' + v.date + ')';
              }).join('\n');

              const prompt = 'You are a finance content strategist for @DailyWealthBuilding (YouTube Shorts channel, personal finance niche).\n\n' +
                'Analyze these recent videos from top finance creators:\n' + videoList + '\n\n' +
                'Identify:\n' +
                '1. Top 3 trending topics this week in finance content\n' +
                '2. Top 3 content gaps -- topics not covered that would perform well for a Shorts audience\n' +
                '3. One specific video angle @DailyWealthBuilding should create next week (be very specific, include hook text)\n\n' +
                'Return ONLY valid JSON:\n' +
                '{"trends":["topic1","topic2","topic3"],"gaps":["gap1","gap2","gap3"],"recommendation":"specific hook and angle for next video"}';

              const body = JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                max_tokens: 500, temperature: 0.4,
                messages: [{ role: 'user', content: prompt }],
              });
              const req = https.request({
                hostname: 'api.groq.com', path: '/openai/v1/chat/completions', method: 'POST',
                headers: {
                  'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body),
                  'Authorization': 'Bearer ' + GROQ_KEY,
                },
              }, function(res) {
                return new Promise(function() {});
              });

              const response = await new Promise(function(resolve, reject) {
                const req2 = https.request({
                  hostname: 'api.groq.com', path: '/openai/v1/chat/completions', method: 'POST',
                  headers: {
                    'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body),
                    'Authorization': 'Bearer ' + GROQ_KEY,
                  },
                }, function(res) {
                  let d = '';
                  res.on('data', function(c) { d += c; });
                  res.on('end', function() { resolve({ status: res.statusCode, body: d }); });
                });
                req2.on('error', reject);
                req2.write(body); req2.end();
              });

              const apiData = JSON.parse(response.body);
              const raw = (((apiData.choices || [])[0] || {}).message || {}).content || '';
              return JSON.parse(raw.replace(/```json|```/g, '').trim());
            } catch(e) {
              console.log('Groq analysis failed: ' + e.message);
              return null;
            }
          }

          (async function() {
            if (!YT_KEY) {
              console.log('YOUTUBE_DATA_API_KEY not set -- skipping competitor tracker');
              console.log('Add YOUTUBE_DATA_API_KEY to GitHub Secrets (different from OAuth -- this is a simple API key)');
              process.exit(0);
            }

            console.log('Fetching competitor videos...');
            const allVideos = [];
            for (const c of COMPETITORS) {
              const videos = await fetchRecentVideos(c.id, c.name);
              allVideos.push.apply(allVideos, videos);
              console.log(c.name + ': ' + videos.length + ' videos');
              await new Promise(function(r) { setTimeout(r, 300); }); // rate limit
            }

            console.log('Total: ' + allVideos.length + ' videos found');

            const cutoff   = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
            const thisWeek = allVideos.filter(function(v) { return v.date >= cutoff; });
            const older    = allVideos.filter(function(v) { return v.date < cutoff; });

            console.log('This week: ' + thisWeek.length + ' | Older: ' + older.length);

            // Analyze with Groq
            const analysis = await analyzeWithGroq(thisWeek.length > 0 ? thisWeek : allVideos);

            // Save report
            const report = {
              generatedAt: new Date().toISOString(),
              thisWeek:    thisWeek,
              older:       older.slice(0, 10),
              analysis:    analysis,
            };
            fs.writeFileSync('competitor-report.json', JSON.stringify(report, null, 2));
            console.log('Saved competitor-report.json');

            // Build ntfy message
            const lines = [
              'DWB COMPETITOR REPORT -- ' + new Date().toISOString().slice(0, 10),
              '----------------------------------------',
              '',
              'NEW THIS WEEK (' + thisWeek.length + ' videos):',
            ];
            thisWeek.slice(0, 8).forEach(function(v) {
              lines.push('[' + v.channel.split(' ')[0] + '] ' + v.title.slice(0, 55));
            });

            if (analysis) {
              lines.push('', 'TRENDING TOPICS:');
              (analysis.trends || []).forEach(function(t) { lines.push('  + ' + t); });
              lines.push('', 'CONTENT GAPS (your opportunity):');
              (analysis.gaps || []).forEach(function(g) { lines.push('  > ' + g); });
              lines.push('', 'YOUR NEXT VIDEO:');
              lines.push('  ' + (analysis.recommendation || '').slice(0, 120));
            }

            const message = lines.join('\n');
            console.log('\n' + message);

            await sendNtfy(
              message,
              'Competitor Report ' + thisWeek.length + ' new videos this week',
              'default'
            );

            console.log('Competitor tracker complete');
          })();
          COMPETITOREOF

      - name: Commit competitor report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add competitor-report.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update competitor report [skip ci]"
          git push || true
